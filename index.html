function bVbField(f,v){if(bDraft)bDraft.vbanner[f]=v;}
function bGalField(f,v){if(bDraft)bDraft.gallery[f]=v;}
function bTileField(i,f,v){if(bDraft&&bDraft.gallery.tiles[i])bDraft.gallery.tiles[i][f]=v;}
function bTilePrev(i){
  if(!bDraft)return;const t=bDraft.gallery.tiles[i];const el=document.getElementById('tileprev_'+i);if(!el||!t)return;
  el.style.backgroundImage=t.image?"url('"+(t.image||'').replace(/'/g,"%27")+"')":'';
  const ic=el.querySelector('.tileprev-ic');if(ic)ic.innerHTML=socialIconSvg(t.platform);
}
function bAddTile(){if(!bDraft)return;if((bDraft.gallery.tiles||[]).length>=6){toast('Up to 6 tiles');return;}bDraft.gallery.tiles.push({image:'',platform:'instagram',url:''});renderAdmin();}
function bRemoveTile(i){if(!bDraft)return;bDraft.gallery.tiles.splice(i,1);renderAdmin();}
function bFeatField(i,f,v){if(bDraft&&bDraft.features[i])bDraft.features[i][f]=v;}
function bFeatImg(i,v){
  if(bDraft&&bDraft.features[i])bDraft.features[i].image=v;
  const el=document.getElementById('featprev_'+i);if(!el)return;
  const u=(v||'').trim();
  el.innerHTML=u?'<img src="'+u.replace(/"/g,'&quot;')+'" alt="">':'woven icon';
}
function bAddFeat(){if(!bDraft)return;if(bDraft.features.length>=4){toast('Up to 4 highlights');return;}bDraft.features.push({image:'',title:'New highlight',body:''});renderAdmin();}
function bRemoveFeat(i){if(!bDraft||bDraft.features.length<=1)return;bDraft.features.splice(i,1);renderAdmin();}
function bSlideField(i,f,v){if(bDraft&&bDraft.slides[i])bDraft.slides[i][f]=v;}
function bSlideImg(i,v){
  if(bDraft&&bDraft.slides[i])bDraft.slides[i].image=v;
  const el=document.getElementById('slideprev_'+i);
  if(el){const u=v.trim();el.style.background=u?`url('${u}') center/cover`:'linear-gradient(120deg,#3A5A52,#2C463F)';el.innerHTML=u?'':'<span>Woven gradient — paste an image URL above to preview</span>';}
}
function bBandField(f,v){if(bDraft)bDraft.band[f]=v;}
function bAuto(v){if(bDraft)bDraft.autoplay=v;}
function bInterval(v){if(bDraft)bDraft.interval=Math.max(2,parseInt(v||5,10)||5)*1000;}
function bAddSlide(){if(!bDraft)return;if(bDraft.slides.length>=6){toast('Up to 6 slides');return;}bDraft.slides.push({eyebrow:'',title:'New slide',subtitle:'',ctaText:'',ctaLink:'#/',image:''});renderAdmin();}
function bRemoveSlide(i){if(!bDraft||bDraft.slides.length<=1)return;bDraft.slides.splice(i,1);renderAdmin();}
function bMoveSlide(i,dir){if(!bDraft)return;const j=i+dir;if(j<0||j>=bDraft.slides.length)return;const a=bDraft.slides;[a[i],a[j]]=[a[j],a[i]];renderAdmin();}
async function saveBanner(){
  if(!bDraft)return;
  DB.hero={autoplay:bDraft.autoplay,interval:bDraft.interval,slides:bDraft.slides.map(s=>({eyebrow:s.eyebrow||'',title:s.title||'',subtitle:s.subtitle||'',ctaText:s.ctaText||'',ctaLink:s.ctaLink||'#/',image:s.image||''}))};
  DB.band={eyebrow:bDraft.band.eyebrow||'',title:bDraft.band.title||'',body:bDraft.band.body||'',ctaText:bDraft.band.ctaText||'',ctaLink:bDraft.band.ctaLink||'#/',image:bDraft.band.image||''};
  const vb=bDraft.vbanner||{};
  DB.videoBanner={enabled:!!vb.enabled,eyebrow:vb.eyebrow||'',heading:vb.heading||'',body:vb.body||'',ctaText:vb.ctaText||'',ctaLink:vb.ctaLink||'#/',videoUrl:(vb.videoUrl||'').trim(),bg:vb.bg||'#2A2622'};
  DB.features=(bDraft.features||[]).map(f=>({image:(f.image||'').trim(),title:f.title||'',body:f.body||''}));
  const g=bDraft.gallery||{};
  DB.socialGallery={enabled:!!g.enabled,heading:g.heading||'',tiles:(g.tiles||[]).map(t=>({image:(t.image||'').trim(),platform:t.platform||'instagram',url:(t.url||'').trim()}))};
  bDraft=null;await persist();renderAdmin();toast('Banner updated');
}

async function saveCategory(id){
  const name=val('c_name').trim();if(!name){toast('Name is required');return;}
  const slug=slugify(val('c_slug')||name);const image=val('c_image');
  const ck=id=>{const el=document.getElementById(id);return el?!!el.checked:true;};
  const filters={type:ck('cf_type'),color:ck('cf_color'),material:ck('cf_material'),price:ck('cf_price')};
  if(id==='new'){DB.categories.push({id:uid('c'),name,slug,image,subcategories:[],filters});}
  else{const c=DB.categories.find(x=>x.id===id);c.name=name;c.slug=slug;c.image=image;c.filters=filters;}
  editingCategory=null;await persist();paintChrome();renderAdmin();toast('Category saved');
}
async function deleteCategory(id){
  const c=DB.categories.find(x=>x.id===id);
  const n=DB.products.filter(p=>p.categoryId===id).length;
  if(!confirm(`Delete "${c.name}"?`+(n?` ${n} product(s) will also be removed.`:'')))return;
  DB.categories=DB.categories.filter(x=>x.id!==id);
  DB.products=DB.products.filter(p=>p.categoryId!==id);
  await persist();paintChrome();renderAdmin();toast('Category deleted');
}
async function addSub(cid){
  const input=document.getElementById('newsub_'+cid);const name=input.value.trim();if(!name)return;
  const c=DB.categories.find(x=>x.id===cid);
  c.subcategories.push({id:uid('s'),name,slug:slugify(name)});
  await persist();renderAdmin();
}
async function deleteSub(cid,sid){
  const c=DB.categories.find(x=>x.id===cid);
  c.subcategories=c.subcategories.filter(s=>s.id!==sid);
  DB.products.forEach(p=>{if(p.subcategoryId===sid)p.subcategoryId=null;});
  await persist();renderAdmin();
}

/* ---- products ---- */
function hasAnySale(p){
  if(isCollection(p)) return p.baseSalePrice!=null || optSize(p).values.some(s=>s.salePrice!=null) || Object.values(p.variants||{}).some(v=>v.salePrice!=null);
  return p.salePrice!=null&&p.salePrice<p.price;
}
function parseInventoryCsv(text){
  var lines=String(text||'').split(/\r?\n/);var n=0;
  lines.forEach(function(ln,i){
    if(!ln.trim())return;
    var parts=ln.split(',');
    var sku=(parts[0]||'').trim().replace(/^"|"$/g,'');
    var qtyRaw=(parts[1]||'').trim().replace(/^"|"$/g,'');
    if(i===0 && /sku/i.test(sku) && !/^-?[0-9]/.test(qtyRaw))return; // header row
    if(!sku)return;
    var q=parseInt(qtyRaw,10);if(isNaN(q))return;
    invMap()[sku]=q;n++;
  });
  return n;
}
function uploadInventoryCSV(){
  var inp=document.getElementById('inv_file');
  if(!inp||!inp.files||!inp.files[0]){toast('Choose a CSV file first');return;}
  var fr=new FileReader();
  fr.onload=function(){try{var n=parseInventoryCsv(fr.result);persist();renderAdmin();toast('Updated '+n+' SKUs');}catch(e){toast('Could not read that file');}};
  fr.onerror=function(){toast('Could not read that file');};
  fr.readAsText(inp.files[0]);
}
function downloadInventoryCsv(){
  var rows=[['sku','quantity','product','variant']];
  allSkus().forEach(function(r){rows.push([r.sku, invTracked(r.sku)?String(invQty(r.sku)):'', r.product, r.variant]);});
  var csv=rows.map(function(r){return r.map(function(c){c=String(c==null?'':c);return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv'});var u=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=u;a.download='home-weavers-inventory.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);
}
function invSetInput(sku,val){var n=parseInt(val,10);invMap()[sku]=isNaN(n)?0:n;persist();renderAdmin();}
function adminInventory(){
  var skus=allSkus();
  var tracked=skus.filter(function(s){return invTracked(s.sku);});
  var outCount=skus.filter(function(s){return invTracked(s.sku)&&invQty(s.sku)<=0;}).length;
  var rows=skus.map(function(s){
    var t=invTracked(s.sku);var q=invQty(s.sku);
    var status=!t?'<span class="hint">not tracked</span>'
      :(q>0?'<span style="color:var(--loom);font-weight:600">In stock</span>'
           :'<span style="color:var(--clay);font-weight:600">OUT — hidden</span>');
    return '<tr style="border-top:1px solid var(--line)"><td style="padding:7px 8px;font-family:var(--ui);font-size:13px">'+esc(s.sku)+'</td><td>'+esc(s.product)+'</td><td class="hint">'+esc(s.variant)+'</td><td style="text-align:center"><input type="number" value="'+(t?q:'')+'" onchange="invSetInput('+JSON.stringify(s.sku).replace(/"/g,'&quot;')+',this.value)" style="width:80px;text-align:center"></td><td style="text-align:center">'+status+'</td></tr>';
  }).join('');
  return `
   <h1>Inventory</h1>
   <p class="sub">Every SKU and its stock. Upload your counts daily — anything at 0 is automatically hidden and shown as out of stock on the store.</p>
   <div class="panel">
     <h3>Daily upload</h3>
     <p class="hint" style="margin:-4px 0 12px">CSV with columns <b>sku,quantity</b>. Download the current list, fill in today's counts, and upload it back.</p>
     <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
       <button class="btn ghost sm" onclick="downloadInventoryCsv()">⬇ Download current (CSV)</button>
       <input type="file" id="inv_file" accept=".csv,text/csv" style="font-size:13px">
       <button class="btn loom sm" onclick="uploadInventoryCSV()">⬆ Upload inventory</button>
     </div>
   </div>
   <div class="panel">
     <h3>Stock levels</h3>
     <p class="hint" style="margin:-4px 0 10px">${skus.length} SKUs · ${tracked.length} tracked · <b style="color:var(--clay)">${outCount} out of stock</b>. You can also edit a number directly below.</p>
     <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:14px"><thead><tr style="text-align:left;color:var(--ink-soft)"><th style="padding:6px 8px">SKU</th><th>Product</th><th>Variant</th><th style="text-align:center">Qty</th><th style="text-align:center">Status</th></tr></thead><tbody>${rows}</tbody></table></div>
   </div>`;
}

          <td><input type="number" step="0.01" value="${ov.price==null?'':ov.price}" placeholder="${defPrice}" oninput="pVarField('${color.id}','${s.id}','price',this.value)"></td>

      </tbody></table>

}

/* draft mutation handlers */
function syncBasics(){
  const g=id=>document.getElementById(id);
  if(g('p_name'))pDraft.name=g('p_name').value;
  if(g('p_desc'))pDraft.description=g('p_desc').value;
  if(g('p_cat'))pDraft.categoryId=g('p_cat').value;
  if(g('p_sub'))pDraft.subcategoryId=g('p_sub').value||null;
  if(g('p_badge'))pDraft.badge=g('p_badge').value;
  if(g('p_featured'))pDraft.featured=g('p_featured').checked;
  if(g('p_material'))pDraft.material=g('p_material').value;
  if(g('p_care'))pDraft.care=g('p_care').value;
  if(g('p_features'))pDraft.features=g('p_features').value.split('\n').map(s=>s.trim()).filter(Boolean);
  if(g('p_origin'))pDraft.origin=g('p_origin').value;
  if(g('p_weight'))pDraft.weight=g('p_weight').value;
  if(g('p_price'))pDraft.price=g('p_price').value;
  if(g('p_sale'))pDraft.salePrice=g('p_sale').value;
  if(g('p_image'))pDraft.image=g('p_image').value;
  if(g('p_video'))pDraft.video=g('p_video').value;
  if(g('p_swatch'))pDraft.swatch=g('p_swatch').value;
  if(g('p_stock'))pDraft.inStock=g('p_stock').checked;
  if(g('p_baseprice'))pDraft.basePrice=g('p_baseprice').value;
  if(g('p_basesale'))pDraft.baseSalePrice=g('p_basesale').value;
  if(g('p_skuprefix'))pDraft.skuPrefix=g('p_skuprefix').value;
}
function pSetType(type){syncBasics();
  if(type==='collection'){
    if(!draftColl()){
      pDraft.options=[
        {id:uid('o'),name:'Color',type:'color',values:[blankColor()]},
        {id:uid('o'),name:'Size',type:'size',values:[blankSize()]}
      ];
      pDraft.variants=pDraft.variants||{};
      if(pDraft.basePrice==null||pDraft.basePrice==='')pDraft.basePrice=pDraft.price||'';
      if(!pDraft.skuPrefix)pDraft.skuPrefix=(pDraft.name||'').replace(/[^A-Za-z0-9]/g,'').slice(0,4).toUpperCase();
    }
  }else{pDraft.options=[];pDraft.variants={};}
  renderAdmin();
}
function pAddColor(){syncBasics();optColor(pDraft).values.push(blankColor());renderAdmin();}
function pRemoveColor(id){const o=optColor(pDraft);if(o.values.length<=1){toast('Keep at least one color');return;}syncBasics();
  o.values=o.values.filter(v=>v.id!==id);
  if(pDraft.variants)Object.keys(pDraft.variants).forEach(k=>{if(k.split('__')[0]===id)delete pDraft.variants[k];});renderAdmin();}
function pColorField(id,f,v){const c=optColor(pDraft).values.find(x=>x.id===id);if(c)c[f]=v;}
function pColorPhoto(id,i,v){const c=optColor(pDraft).values.find(x=>x.id===id);if(!c)return;c.images=c.images||[];while(c.images.length<8)c.images.push('');c.images[i]=v;}
function pColorPrimary(id,i){syncBasics();const c=optColor(pDraft).values.find(x=>x.id===id);if(c)c.primary=i;renderAdmin();}
function pSimplePhoto(i,v){pDraft.images=pDraft.images||[];while(pDraft.images.length<8)pDraft.images.push('');pDraft.images[i]=v;}
function pSimplePrimary(i){syncBasics();pDraft.primary=i;renderAdmin();}
function pAddSize(){syncBasics();optSize(pDraft).values.push(blankSize());renderAdmin();}
function pRemoveSize(id){const o=optSize(pDraft);if(o.values.length<=1){toast('Keep at least one size');return;}syncBasics();
  o.values=o.values.filter(v=>v.id!==id);
  if(pDraft.variants)Object.keys(pDraft.variants).forEach(k=>{if(k.split('__')[1]===id)delete pDraft.variants[k];});renderAdmin();}
function pSizeField(id,f,v){const s=optSize(pDraft).values.find(x=>x.id===id);if(s)s[f]=v;}
function pVarField(colorId,sizeId,f,v){pDraft.variants=pDraft.variants||{};const k=vKey(colorId,sizeId);const o=pDraft.variants[k]||(pDraft.variants[k]={});o[f]=v;}

function onCatChange(){
  pDraft.categoryId=val('p_cat');
  const c=DB.categories.find(x=>x.id===pDraft.categoryId);
  const sel=document.getElementById('p_sub');
  sel.innerHTML=(c?c.subcategories:[]).map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('')||'<option value="">—</option>';
  pDraft.subcategoryId=c&&c.subcategories[0]?c.subcategories[0].id:null;

function startNewProduct(){pDraft=newProductTemplate();editingProduct='new';adminTab='products';renderAdmin();}
function editProduct(id){pDraft=JSON.parse(JSON.stringify(DB.products.find(x=>x.id===id)));editingProduct=id;adminTab='products';renderAdmin();}
function cancelProduct(){pDraft=null;editingProduct=null;renderAdmin();}
async function saveProduct(id){
  syncBasics();
  const name=(pDraft.name||'').trim();if(!name){toast('Name is required');return;}
  const num=v=>{if(v===''||v==null)return null;const n=parseFloat(v);return isNaN(n)?null:n;};
  const out={id:id==='new'?uid('p'):id,name,slug:slugify(name),description:pDraft.description||'',
    categoryId:pDraft.categoryId,subcategoryId:pDraft.subcategoryId||null,badge:pDraft.badge||'',featured:!!pDraft.featured,
    material:pDraft.material||'',care:pDraft.care||'',origin:pDraft.origin||'',weight:(pDraft.weight!==''&&pDraft.weight!=null?+pDraft.weight:null),features:(pDraft.features||[]).filter(Boolean)};
  if(draftColl()){
    const colorOpt=optColor(pDraft),sizeOpt=optSize(pDraft);
    colorOpt.values.forEach(c=>{c.images=(c.images||[]).map(x=>x||'').slice(0,8);c.video=(c.video||'').trim();c.primary=Math.max(0,Math.min(c.primary||0,7));});
    sizeOpt.values.forEach(s=>{s.price=num(s.price);s.salePrice=num(s.salePrice);});
    const vs={};Object.keys(pDraft.variants||{}).forEach(k=>{const o=pDraft.variants[k];
      const price=num(o.price),sale=num(o.salePrice),inStock=o.inStock!==false,sku=(o.sku||'').trim();
      const e={};if(price!=null)e.price=price;if(sale!=null)e.salePrice=sale;if(!inStock)e.inStock=false;if(sku)e.sku=sku;
      if(Object.keys(e).length)vs[k]=e;});
    out.options=pDraft.options;out.variants=vs;
    out.basePrice=num(pDraft.basePrice)||0;out.baseSalePrice=num(pDraft.baseSalePrice);
    out.skuPrefix=(pDraft.skuPrefix||'').trim();out.inStock=true;
  }else{
    out.price=num(pDraft.price)||0;out.salePrice=num(pDraft.salePrice);
    out.images=(pDraft.images||[]).map(x=>x||'').slice(0,8);
    out.video=(pDraft.video||'').trim();
    out.primary=Math.max(0,Math.min(pDraft.primary||0,7));
    out.image=out.images[out.primary]||out.images.find(Boolean)||'';
    out.swatch=pDraft.swatch||'#C9BBA6';out.inStock=pDraft.inStock!==false;
  }
  if(id==='new')DB.products.push(out);else{const i=DB.products.findIndex(x=>x.id===id);DB.products[i]=out;}
  pDraft=null;editingProduct=null;await persist();paintChrome();renderAdmin();toast('Product saved');
}
async function deleteProduct(id){
  const p=DB.products.find(x=>x.id===id);if(!confirm('Delete "'+p.name+'"?'))return;
  DB.products=DB.products.filter(x=>x.id!==id);await persist();renderAdmin();toast('Product deleted');
}

  else{const t=document.createElement('textarea');t.value=text;document.body.appendChild(t);t.select();try{document.execCommand('copy');toast('Emails copied');}catch(e){toast('Copy failed');}document.body.removeChild(t);}

function downloadSubscribers(){

  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');

  const a=document.createElement('a');a.href=url;a.download='homeweavers-subscribers.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);

/* ---------- boot ---------- */
async function boot(){
  await ensureSupabaseLib();
  DB=await loadStore();
  if(!DB){DB=seedData();await saveStore(DB);}
  // ensure newer fields exist if loaded from older shape
  if(!DB.band)DB.band=seedData().band;
  if(DB.band&&DB.band.ctaLink==null)DB.band.ctaLink='#/page/our-story';
  if(!DB.password)DB.password='weave';
  if(!DB.promos)DB.promos=seedData().promos;
  if(!DB.shipping)DB.shipping=seedData().shipping;
  if(!DB.pages)DB.pages=seedData().pages;
  if(!DB.videoBanner)DB.videoBanner=seedData().videoBanner;
  if(!DB.features)DB.features=seedData().features;
  if(!DB.subscribers)DB.subscribers=[];
  if(!DB.newsletter)DB.newsletter={couponCode:'WELCOME15'};
  if(!DB.social)DB.social={facebook:'',instagram:'',pinterest:''};
  if(!DB.snipcart)DB.snipcart=seedData().snipcart;
  if(!DB.marketing)DB.marketing=seedData().marketing;
  if(!DB.socialGallery)DB.socialGallery=seedData().socialGallery;
  (DB.products||[]).forEach(p=>{if(!Array.isArray(p.features))p.features=[];});
  (DB.categories||[]).forEach(c=>{if(!c.filters)c.filters={type:true,color:true,material:true,price:true};});
  (DB.products||[]).forEach(p=>{
    if(isCollection(p)){
      optColor(p).values.forEach(c=>{
        c.images=Array.isArray(c.images)?c.images.slice(0,8):[];
        while(c.images.length<8)c.images.push('');
        if(typeof c.video!=='string')c.video='';
        if(typeof c.primary!=='number')c.primary=0;
      });
    }else{
      if(!Array.isArray(p.images))p.images=p.image?[p.image]:[];
      p.images=p.images.slice(0,8);while(p.images.length<8)p.images.push('');
      if(typeof p.video!=='string')p.video='';
      if(typeof p.primary!=='number')p.primary=0;
    }
  });
  // migrate old single hero -> slider with slides[]
  if(DB.hero&&!Array.isArray(DB.hero.slides)){
    DB.hero={autoplay:true,interval:5000,slides:[{eyebrow:DB.hero.eyebrow||'',title:DB.hero.title||'',subtitle:DB.hero.subtitle||'',ctaText:DB.hero.ctaText||'',ctaLink:DB.hero.ctaLink||'#/',image:DB.hero.image||''}]};
  }
  // (removed) previously re-added a sample collection when none existed — that fought manual deletes / empty-store

  paintChrome();
  normalizeEntryHash();
  window.addEventListener('popstate',router);
  wireLinkClicks();
  window.addEventListener('resize',initRails);
  window.addEventListener('resize',initGallery);
  router();
  try{initSnipcart();}catch(e){console.error('Snipcart init skipped:',e);}
}
boot();
