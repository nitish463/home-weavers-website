<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Home Weavers — Woven for the way you live</title>
<script>
  /* GitHub Pages SPA fallback: 404.html redirects deep links to "?/path"; decode it back
     into a real path before the app boots so refreshes and shared links work. */
  (function(l){
    if(l.search.charAt(1)==='/'){
      var decoded=l.search.slice(1).split('&').map(function(s){return s.replace(/~and~/g,'&');}).join('?');
      window.history.replaceState(null,null,l.pathname.slice(0,-1)+decoded+l.hash);
    }
  })(window.location);
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F7F4EF;       /* unbleached cotton */
    --linen:#EFEAE1;       /* raw linen surface */
    --card:#FFFFFF;
    --ink:#2A2622;         /* soft espresso */
    --ink-soft:#6C6359;
    --line:#DAD3C7;        /* hairline */
    --loom:#3A5A52;        /* spruce / loom green (primary) */
    --loom-dk:#2C463F;
    --clay:#B5754F;        /* muted clay (sale accent, used sparingly) */
    --shadow:0 1px 2px rgba(42,38,34,.06), 0 12px 28px -16px rgba(42,38,34,.18);
    --r:4px;
    --snip-top:0px; /* height of Snipcart's test-mode bar, set at runtime */
    --maxw:1320px;
    --disp:"Fraunces",Georgia,serif;
    --ui:"Inter",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--ui);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;padding-top:var(--snip-top,0)}
  img{max-width:100%;display:block}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer}
  h1,h2,h3,h4{font-family:var(--disp);font-weight:400;letter-spacing:-.01em;margin:0;line-height:1.08}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px}
  .eyebrow{font-family:var(--ui);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
  .muted{color:var(--ink-soft)}
  .center{text-align:center}

  /* ---- buttons ---- */
  .btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--ink);background:var(--ink);color:#fff;
       padding:13px 26px;border-radius:var(--r);font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;transition:.18s}
  .btn:hover{background:var(--loom);border-color:var(--loom)}
  .btn.ghost{background:transparent;color:var(--ink)}
  .btn.ghost:hover{background:var(--ink);color:#fff}
  .btn.loom{background:var(--loom);border-color:var(--loom)}
  .btn.loom:hover{background:var(--loom-dk);border-color:var(--loom-dk)}
  .btn.sm{padding:9px 16px;font-size:11px}
  .btn.block{width:100%;justify-content:center}
  .link-u{font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;border-bottom:1px solid var(--ink);padding-bottom:3px}

  /* ---- announcement ---- */
  .announce{background:var(--loom-dk);color:#F1EDE4;text-align:center;font-size:12.5px;letter-spacing:.04em;padding:9px 16px}
  .announce span{opacity:.92}

  /* ---- header ---- */
  header.site{position:sticky;top:var(--snip-top,0);z-index:40;background:rgba(247,244,239,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .htop{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:18px;padding:12px 40px}
  .hbar{border-top:1px solid var(--line)}
  .hbar .nav{max-width:var(--maxw);margin:0 auto;padding:11px 28px;justify-content:center;flex-wrap:wrap;row-gap:4px}
  .nav{display:flex;gap:26px;align-items:center}
  .navitem{position:relative;padding-bottom:4px}
  .nav a{font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:500;color:var(--ink);padding:6px 0;position:relative}
  .navitem>a:after{content:"";position:absolute;left:0;right:100%;bottom:0;height:1.5px;background:var(--loom);transition:right .25s}
  .navitem:hover>a:after,.navitem:focus-within>a:after{right:0}
  .flyout{position:absolute;top:100%;left:50%;transform:translateX(-50%) translateY(8px);min-width:216px;
    background:var(--paper);border:1px solid var(--line);border-radius:6px;box-shadow:var(--shadow);
    padding:9px;opacity:0;visibility:hidden;transition:opacity .18s,transform .18s,visibility .18s;z-index:50}
  .flyout::before{content:"";position:absolute;left:0;right:0;top:-14px;height:14px}
  .navitem:hover .flyout,.navitem:focus-within .flyout{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
  .flyout a{display:block;padding:9px 12px;font-size:13px;letter-spacing:.01em;text-transform:none;font-weight:500;color:var(--ink);border-radius:4px}
  .flyout a:after{display:none}
  .flyout a:hover{background:var(--linen);color:var(--loom-dk)}
  .flyout .shopall{margin-top:6px;padding-top:11px;border-top:1px solid var(--line);font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:var(--ink-soft)}
  .flyout .shopall:hover{color:var(--loom-dk)}
  .brand{grid-column:2;justify-self:center;line-height:1}
  .brand .mark{font-family:var(--disp);font-size:28px;letter-spacing:.02em;display:flex;align-items:center;justify-content:center;gap:13px}
  .brand .mark svg{flex:0 0 auto}
  .brand .mark .logo-img{height:66px;width:auto;max-width:340px;object-fit:contain;display:block}
  .wordblock{display:flex;flex-direction:column;align-items:flex-start;line-height:1.04}
  .wordblock #brandName{white-space:nowrap}
  .brand .tagline{font-size:9.5px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-soft);margin-top:7px;white-space:nowrap}
  .hactions{grid-column:3;justify-self:end;display:flex;gap:18px;align-items:center}
  .iconbtn{background:none;border:none;color:var(--ink);display:flex;align-items:center;gap:7px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;padding:4px}
  .cartcount{background:var(--loom);color:#fff;border-radius:999px;min-width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:600;padding:0 5px}
  .menu-toggle{display:none;grid-column:1;justify-self:start}

  /* ---- hero ---- */
  .hero{position:relative;min-height:560px;overflow:hidden;border-bottom:1px solid var(--line);background:var(--loom-dk)}
  .hslide{position:absolute;inset:0;display:flex;align-items:center;opacity:0;visibility:hidden;transition:opacity .8s ease}
  .hslide.active{opacity:1;visibility:visible}
  .hero .bg{position:absolute;inset:0;background-size:cover;background-position:center}
  .hero .scrim{position:absolute;inset:0;background:linear-gradient(90deg,rgba(28,24,21,.55) 0%,rgba(28,24,21,.28) 42%,rgba(28,24,21,0) 72%)}
  .hero .inner{position:relative;max-width:var(--maxw);margin:0 auto;padding:64px 28px;width:100%}
  .hero .card{max-width:540px;color:#fff}
  .hero .eyebrow{color:#E7DFD0}
  .hero h1{color:#fff;font-size:clamp(38px,5.4vw,68px);margin:18px 0 16px;font-weight:500}
  .hero p{font-size:18px;color:#F0EADF;max-width:440px;margin:0 0 30px}
  .hero .btn{background:#fff;color:var(--ink);border-color:#fff}
  .hero .btn:hover{background:var(--loom);color:#fff;border-color:var(--loom)}
  .hnav{position:absolute;top:50%;transform:translateY(-50%);z-index:3;width:46px;height:46px;border-radius:999px;border:1px solid rgba(255,255,255,.45);background:rgba(28,24,21,.25);color:#fff;font-size:24px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
  .hnav:hover{background:rgba(28,24,21,.55)}
  .hnav.prev{left:22px}.hnav.next{right:22px}
  .hdots{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);z-index:3;display:flex;gap:9px}
  .hdots button{width:9px;height:9px;border-radius:999px;border:none;background:rgba(255,255,255,.5);cursor:pointer;padding:0;transition:.25s}
  .hdots button.active{background:#fff;width:26px;border-radius:6px}

  /* ---- section heads ---- */
  .section{padding:74px 0}
  .section.tight{padding:50px 0}
  .shead{text-align:center;max-width:620px;margin:0 auto 42px}
  .shead h2{font-size:clamp(28px,3.4vw,40px);margin:12px 0 0}
  .weave-rule{width:62px;height:14px;margin:0 auto 4px;opacity:.8}

  /* ---- horizontal rails (shared) ---- */
  .rail-wrap{position:relative}
  .rail{display:flex;gap:14px;overflow-x:auto;scroll-snap-type:x proximity;padding:4px 2px 8px;scrollbar-width:none;-ms-overflow-style:none;scroll-behavior:smooth}
  .rail::-webkit-scrollbar{display:none}
  .rail>*{scroll-snap-align:start}
  .cat-rail .cat-tile{flex:0 0 calc((100% - 42px)/4)}
  .prod-rail .pcard{flex:0 0 calc((100% - 42px)/4)}
  .rail-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:5;width:48px;height:48px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.94);box-shadow:var(--shadow);color:var(--ink);font-size:24px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .2s,background .2s,transform .2s}
  .rail-nav:hover{background:#fff;transform:translateY(-50%) scale(1.05)}
  .rail-nav.prev{left:-14px}
  .rail-nav.next{right:-14px}
  .rail-nav.off{opacity:0;visibility:hidden;pointer-events:none}
  .cat-tile{position:relative;border-radius:var(--r);overflow:hidden;aspect-ratio:3/3.85;display:block;background:var(--linen);box-shadow:var(--shadow)}
  .cat-tile .ph{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .6s ease}
  .cat-tile:hover .ph{transform:scale(1.045)}
  .cat-tile .ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(28,24,21,0) 38%,rgba(28,24,21,.62) 100%)}
  .cat-tile .lab{position:absolute;left:0;right:0;bottom:0;padding:20px;color:#fff}
  .cat-tile .lab h3{font-size:23px;color:#fff}
  .cat-tile .lab span{font-size:11px;letter-spacing:.16em;text-transform:uppercase;opacity:.9}

  /* ---- product grid ---- */
  .p-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:26px 22px}
  .pcard{background:transparent;display:flex;flex-direction:column}
  .pcard .imgwrap{position:relative;border-radius:var(--r);overflow:hidden;background:var(--linen);aspect-ratio:3/3.85;box-shadow:var(--shadow)}
  .pcard .imgwrap .ph{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .5s}
  .pcard:hover .imgwrap .ph{transform:scale(1.04)}
  .pcard .badge{position:absolute;top:12px;left:12px;background:#fff;color:var(--ink);font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;padding:5px 10px;border-radius:999px}
  .pcard .badge.sale{background:var(--clay);color:#fff}
  .pcard .quick{position:absolute;left:12px;right:12px;bottom:12px;opacity:0;transform:translateY(8px);transition:.25s}
  .pcard:hover .quick{opacity:1;transform:none}
  .pcard .meta{padding:14px 2px 0}
  .pcard .meta .cat{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
  .pcard .meta h3{font-family:var(--disp);font-size:18px;margin:5px 0 6px}
  .price{display:flex;gap:9px;align-items:baseline;font-size:15px}
  .price .now{font-weight:600}
  .price .was{color:var(--ink-soft);text-decoration:line-through;font-size:13px}
  .price .now.on{color:var(--clay)}

  /* ---- editorial band ---- */
  .band{background:var(--linen);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .band .grid{display:grid;grid-template-columns:1.05fr 1fr;align-items:center;gap:0}
  .band .copy{padding:72px 64px}
  .band .copy h2{font-size:clamp(28px,3.2vw,38px);margin:14px 0 16px}
  .band .copy p{color:var(--ink-soft);font-size:16px;max-width:430px;margin:0 0 26px}
  .band .pic{align-self:stretch;min-height:420px;background-size:cover;background-position:center}
  .features{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:30px;text-align:center}
  .feature h4{font-family:var(--ui);font-size:13px;letter-spacing:.04em;font-weight:600;margin:14px 0 6px;text-transform:uppercase}
  .feature p{color:var(--ink-soft);font-size:13.5px;margin:0}
  .feature .ic{margin:0 auto;color:var(--loom);display:flex;align-items:center;justify-content:center;min-height:46px}
  .feature .ic svg{width:34px;height:34px}
  .feature .ic img{width:auto;height:46px;max-width:90px;object-fit:contain;display:block}

  /* ---- breadcrumb / listing ---- */
  .crumb{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);padding:26px 0 0}
  /* ---- cms content page ---- */
  .cms{max-width:760px;margin:0 auto;padding:14px 0 30px}
  .cms h1{font-size:clamp(32px,4vw,46px);margin:18px 0 26px}
  .cms-body{font-size:16px;line-height:1.8;color:var(--ink-soft)}
  .cms-body h2{font-size:26px;color:var(--ink);margin:30px 0 12px}
  .cms-body h3{font-size:20px;color:var(--ink);margin:26px 0 10px}
  .cms-body p{margin:0 0 18px}
  .cms-body ul{margin:0 0 18px;padding-left:20px}
  .cms-body li{margin:0 0 8px}
  .cms-body strong{color:var(--ink)}
  .crumb a:hover{color:var(--ink)}
  .listing-head{padding:18px 0 30px;display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-bottom:36px}
  .listing-head h1{font-size:clamp(30px,4vw,46px)}
  .subnav{display:flex;gap:10px;flex-wrap:wrap}
  .chip{border:1px solid var(--line);background:var(--card);padding:8px 15px;border-radius:999px;font-size:12px;letter-spacing:.04em;font-weight:500;color:var(--ink)}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip:hover{border-color:var(--ink)}
  /* ---- category filter layout ---- */
  .catlayout{display:grid;grid-template-columns:232px 1fr;gap:38px;align-items:start}
  .catlayout.nofilters{grid-template-columns:1fr}
  .catmain .p-grid{grid-template-columns:repeat(3,1fr);gap:24px 20px}
  .cfilters{position:sticky;top:120px;padding-bottom:30px}
  .cf-head{display:flex;justify-content:space-between;align-items:center;font-size:12px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;color:var(--ink);padding-bottom:14px;border-bottom:1px solid var(--line)}
  .cf-clear{background:none;border:none;color:var(--loom);font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;font-weight:600;padding:0}
  .cf-clear:hover{text-decoration:underline}
  .cf-group{padding:18px 0;border-bottom:1px solid var(--line)}
  .cf-group h4{font-family:var(--ui);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 12px;font-weight:600}
  .cf-opt{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:14px;color:var(--ink);cursor:pointer}
  .cf-opt input{width:16px;height:16px;accent-color:var(--loom);cursor:pointer}
  .cf-colors{display:flex;flex-direction:column;gap:2px}
  .cf-color{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:14px;color:var(--ink);cursor:pointer}
  .cf-color input{width:16px;height:16px;accent-color:var(--loom);cursor:pointer}
  .cf-dot{width:16px;height:16px;border-radius:50%;border:1px solid rgba(0,0,0,.15);flex:0 0 auto}
  .cf-price{display:flex;align-items:center;gap:8px}
  .cf-price input{width:100%;min-width:0;border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-size:13.5px;background:var(--card)}
  .cf-price span{color:var(--ink-soft)}
  .cf-slider{position:relative;height:26px;margin:8px 2px 0}
  .cf-strack{position:absolute;left:0;right:0;top:50%;height:3px;background:var(--line);border-radius:3px;transform:translateY(-50%)}
  .cf-srange{position:absolute;top:50%;height:3px;background:var(--ink);border-radius:3px;transform:translateY(-50%)}
  .cf-slider input[type=range]{position:absolute;left:0;top:0;width:100%;height:26px;margin:0;background:none;-webkit-appearance:none;appearance:none;pointer-events:none}
  .cf-slider input[type=range]:focus{outline:none}
  .cf-smin{z-index:3}.cf-smax{z-index:4}
  .cf-slider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;border:1.5px solid var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.25);cursor:grab;pointer-events:auto}
  .cf-slider input[type=range]::-webkit-slider-thumb:active{cursor:grabbing}
  .cf-slider input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#fff;border:1.5px solid var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.25);cursor:grab;pointer-events:auto}
  .cf-slider input[type=range]::-webkit-slider-runnable-track{background:none;height:26px}
  .cf-slider input[type=range]::-moz-range-track{background:none;height:26px}
  .cf-slabels{display:flex;justify-content:space-between;font-size:13.5px;color:var(--ink);margin-top:10px}
  .cf-pricehint{font-size:12px;color:var(--ink-soft);margin-top:8px}
  .cf-adminopt{display:flex;gap:11px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px;cursor:pointer}
  .cf-adminopt:last-child{border-bottom:none}
  .cf-adminopt input{width:17px;height:17px;margin-top:2px;accent-color:var(--loom);cursor:pointer}

  /* ---- product detail ---- */
  .pdp{display:grid;grid-template-columns:1.05fr .95fr;gap:54px;padding:34px 0 30px}
  .pdp .gallery{border-radius:var(--r);overflow:hidden;background:var(--linen);aspect-ratio:1/1;box-shadow:var(--shadow);position:relative}
  .pdp .gallery .ph{position:absolute;inset:0;background-size:cover;background-position:center}
  .pdp .info h1{font-size:clamp(30px,3.6vw,44px);margin:8px 0 14px}
  .pdp .info .price{font-size:22px;margin:6px 0 22px}
  .pdp .desc{color:var(--ink-soft);font-size:15.5px;line-height:1.7;margin:0 0 26px}
  .qtyrow{display:flex;gap:14px;align-items:center;margin:0 0 22px}
  .stepper{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:var(--r);background:#fff}
  .stepper button{background:none;border:none;width:42px;height:46px;font-size:18px;color:var(--ink)}
  .stepper span{min-width:36px;text-align:center;font-weight:600}
  .detail-list{list-style:none;padding:22px 0 0;margin:24px 0 0;border-top:1px solid var(--line)}
  .detail-list li{display:flex;gap:10px;padding:7px 0;font-size:14px;color:var(--ink-soft)}
  .detail-list li b{color:var(--ink);font-weight:600;min-width:120px}
  .detail-list.flat{border-top:none;margin:0;padding:0}
  /* ---- pdp detail tabs ---- */
  .pdp-tabs{margin:6px 0 18px;border-top:1px solid var(--line)}
  .pdp-tabnav{display:flex;gap:4px;flex-wrap:wrap;border-bottom:1px solid var(--line)}
  .pdt-btn{background:none;border:none;padding:16px 24px;font-family:var(--ui);font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;color:var(--ink-soft);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .pdt-btn:hover{color:var(--ink)}
  .pdt-btn.active{color:var(--ink);border-bottom-color:var(--ink)}
  .pdp-tabbody{padding:26px 2px 6px}
  .pdp-tabwrap{display:grid;grid-template-columns:1.55fr .85fr;gap:54px;align-items:start}
  .pdt-panel{display:none}
  .pdt-panel.active{display:block;animation:fadeup .3s ease}
  @keyframes fadeup{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .pdt-panel .detail-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:2px 44px}
  .pdt-panel .detail-list li{padding:10px 0;border-bottom:1px solid var(--line)}
  .pdt-panel .bullets{columns:2;column-gap:44px}
  .pdt-panel .bullets li{break-inside:avoid}
  .pdp-aside{background:var(--linen);border:1px solid var(--line);border-radius:14px;padding:6px 22px}
  .passure{display:flex;gap:14px;align-items:flex-start;padding:18px 0;border-bottom:1px solid var(--line)}
  .passure:last-child{border-bottom:none}
  .pa-ic{flex:0 0 auto;width:26px;height:26px;color:var(--loom);display:flex;align-items:center;justify-content:center;margin-top:1px}
  .pa-ic svg{width:24px;height:24px}
  .passure b{display:block;font-size:14px;color:var(--ink);font-weight:600;margin-bottom:3px}
  .passure span{display:block;font-size:13px;color:var(--ink-soft);line-height:1.5}
  .pdp-block{margin-top:22px;padding-top:20px;border-top:1px solid var(--line)}
  .pdp-block h4{font-family:var(--ui);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);margin:0 0 12px;font-weight:600}
  .bullets{list-style:none;margin:0;padding:0}
  .bullets li{position:relative;padding:5px 0 5px 20px;font-size:14px;color:var(--ink-soft);line-height:1.5}
  .bullets li::before{content:'';position:absolute;left:2px;top:12px;width:6px;height:6px;border-radius:50%;background:var(--loom)}

  /* ---- card swatches ---- */
  .cardswatch{display:flex;gap:6px;align-items:center;margin-top:10px}
  .cardswatch span{width:15px;height:15px;border-radius:999px;border:1px solid rgba(42,38,34,.15);box-shadow:inset 0 0 0 2px #fff}
  .cardswatch em{font-style:normal;font-size:11px;color:var(--ink-soft);margin-left:2px}

  /* ---- pdp gallery w/ thumbs ---- */
  .pdp .gallerywrap{display:flex;flex-direction:column;gap:12px}
  .thumbs{display:flex;gap:10px;flex-wrap:wrap}
  .thumbs button{width:64px;height:64px;border-radius:var(--r);overflow:hidden;border:1px solid var(--line);padding:0;background-size:cover;background-position:center;cursor:pointer;opacity:.72;transition:.18s}
  .thumbs button:hover{opacity:1}
  .thumbs button.active{opacity:1;border-color:var(--ink);box-shadow:0 0 0 2px var(--ink)}
  /* ---- vertical gallery (thumbs left, main right, video) ---- */
  .galleryV{display:flex;gap:14px;align-items:flex-start}
  .vthumbs-wrap{display:flex;flex-direction:column;width:76px;gap:8px;flex:0 0 auto;max-height:100%}
  .vth-nav{height:26px;border:1px solid var(--line);background:var(--card);border-radius:8px;cursor:pointer;color:var(--ink-soft);font-size:11px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .vth-nav:hover{color:var(--ink);border-color:var(--ink)}
  .vthumbs{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;gap:10px;overflow-y:auto;scrollbar-width:none;-ms-overflow-style:none}
  .vthumbs::-webkit-scrollbar{display:none}
  .vth{flex:0 0 auto;width:76px;height:76px;border-radius:10px;overflow:hidden;border:1px solid var(--line);padding:0;background-size:cover;background-position:center;cursor:pointer;opacity:.7;transition:.18s;position:relative}
  .vth:hover{opacity:1}
  .vth.active{opacity:1;border-color:var(--ink);box-shadow:0 0 0 2px var(--ink)}
  .vth-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.34);color:#fff;font-size:17px}
  .vmain{position:relative;flex:1 1 auto;min-width:0}
  .galvideo{position:absolute;inset:0;background:#000}
  .galvideo iframe,.galvideo video{width:100%;height:100%;border:0;object-fit:cover;display:block}
  .gnav{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:rgba(255,255,255,.92);color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;line-height:1;opacity:0;transition:.2s;z-index:2}
  .vmain:hover .gnav{opacity:1}
  .gnav.prev{left:12px}.gnav.next{right:12px}
  .gnav:hover{background:#fff;border-color:var(--ink)}

  /* ---- variant options ---- */
  .optblock{margin:0 0 22px}
  .optblock .lab{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:11px}
  .optblock .lab .t{font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-weight:600}
  .optblock .lab .v{font-size:14px;color:var(--ink-soft)}
  .swatches{display:flex;flex-wrap:wrap;gap:10px}
  .swatch-btn{width:34px;height:34px;border-radius:999px;border:1px solid rgba(42,38,34,.18);cursor:pointer;position:relative;box-shadow:inset 0 0 0 3px #fff;transition:.15s;padding:0}
  .swatch-btn.active{box-shadow:inset 0 0 0 3px #fff,0 0 0 2px var(--ink)}
  .swatch-btn:hover{transform:scale(1.06)}
  .sizes{display:flex;flex-wrap:wrap;gap:9px}
  .size-btn{min-width:62px;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:var(--r);padding:11px 14px;font-size:13.5px;font-weight:500;cursor:pointer;transition:.15s}
  .size-btn:hover{border-color:var(--ink)}
  .size-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .size-btn.oos{opacity:.4;text-decoration:line-through;cursor:not-allowed}
  .stocknote{font-size:13px;font-weight:600;margin:0 0 18px}
  .stocknote.in{color:var(--loom)}
  .stocknote.out{color:var(--clay)}

  /* ---- cart drawer ---- */
  .scrim-full{position:fixed;inset:0;background:rgba(28,24,21,.4);opacity:0;visibility:hidden;transition:.25s;z-index:60}
  .scrim-full.open{opacity:1;visibility:visible}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(420px,92vw);background:var(--paper);z-index:61;transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column;box-shadow:-20px 0 60px -30px rgba(0,0,0,.5)}
  .drawer.open{transform:none}
  .drawer header{display:flex;justify-content:space-between;align-items:center;padding:22px;border-bottom:1px solid var(--line)}
  .drawer header h3{font-size:22px}
  .drawer .items{flex:1;overflow:auto;padding:8px 22px}
  .citem{display:grid;grid-template-columns:74px 1fr auto;gap:14px;padding:18px 0;border-bottom:1px solid var(--line)}
  .citem .thumb{width:74px;height:74px;border-radius:var(--r);background-size:cover;background-position:center;background-color:var(--linen)}
  .citem h4{font-family:var(--disp);font-size:16px;margin:0 0 3px}
  .citem .rm{background:none;border:none;color:var(--ink-soft);font-size:12px;text-decoration:underline;padding:4px 0}
  .drawer .foot{padding:22px;border-top:1px solid var(--line);background:var(--linen)}
  .sumrow{display:flex;justify-content:space-between;font-size:15px;margin-bottom:6px}
  .sumrow.total{font-size:18px;font-weight:600;margin:10px 0 16px}
  .sumrow .disc{color:var(--loom)}
  .empty-cart{padding:60px 22px;text-align:center;color:var(--ink-soft)}
  /* free-ship progress + promo */
  .shipbar{margin:2px 0 14px}
  .shipbar .track{height:6px;border-radius:999px;background:var(--linen);overflow:hidden}
  .shipbar .track i{display:block;height:100%;background:var(--loom);transition:width .3s}
  .shipbar .msg{font-size:12.5px;color:var(--ink-soft);margin-top:7px}
  .shipbar .msg.free{color:var(--loom);font-weight:600}
  .promo-wrap{margin:4px 0 14px}
  .promo-row{display:flex;gap:8px}
  .promo-row input{flex:1;text-transform:uppercase;letter-spacing:.04em}
  .promo-row button{white-space:nowrap}
  .promo-note{font-size:12.5px;margin-top:7px}
  .promo-note.err{color:var(--clay)}
  .promo-note.ok{color:var(--loom)}
  .promo-chip{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--linen);border:1px dashed var(--loom);border-radius:var(--r);padding:10px 12px;font-size:13.5px}
  .promo-chip b{letter-spacing:.05em}
  .promo-chip button{background:none;border:none;color:var(--ink-soft);font-size:13px;cursor:pointer;text-decoration:underline}

  /* ---- video banner (full-bleed background) ---- */
  .vbanner{position:relative;overflow:hidden;color:#fff;min-height:400px;display:flex;align-items:center;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .vbanner-bg{position:absolute;inset:0;z-index:0;pointer-events:none;background:#1f211f}
  .vbanner-bg video{width:100%;height:100%;object-fit:cover;display:block}
  .vbanner-bg iframe{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100vw;height:56.25vw;min-height:100%;min-width:177.78vh;border:0;pointer-events:none}
  .vbanner-scrim{position:absolute;inset:0;z-index:1;background:linear-gradient(90deg,rgba(18,16,14,.74) 0%,rgba(18,16,14,.45) 48%,rgba(18,16,14,.18) 100%)}
  .vbanner-inner{position:relative;z-index:2;width:100%}
  .vbanner-copy{max-width:560px;padding:44px 0}
  .vbanner-copy .eyebrow{color:#E7DFD0}
  .vbanner-copy h2{color:#fff;font-size:clamp(28px,3.4vw,46px);margin:10px 0 14px;font-weight:500}
  .vbanner-copy p{color:#F0EADF;font-size:17px;line-height:1.6;max-width:470px;margin:0 0 24px}
  .vbanner-copy .btn{background:#fff;color:var(--ink);border-color:#fff}
  .vbanner-copy .btn:hover{background:var(--loom);color:#fff;border-color:var(--loom)}

  /* ---- social gallery band ---- */
  .sgband{padding:10px 0 64px}
  .sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:0 14px}
  .sgtile{position:relative;display:flex;align-items:center;justify-content:center;aspect-ratio:4/3.6;overflow:hidden;background-size:cover;background-position:center;background-color:#cdbfae}
  .sgtile.noimg{background:linear-gradient(135deg,var(--loom),var(--loom-dk))}
  .sgtile-scrim{position:absolute;inset:0;background:rgba(40,34,28,.28);transition:background .25s}
  .sgtile:hover .sgtile-scrim{background:rgba(40,34,28,.12)}
  .sgtile-circle{position:relative;z-index:1;width:104px;height:104px;border-radius:50%;border:2.5px solid rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;color:#fff;transition:transform .3s,background .25s}
  .sgtile:hover .sgtile-circle{transform:scale(1.06);background:rgba(255,255,255,.12)}
  .sgtile-circle svg{width:46px;height:46px}

  /* ---- footer ---- */
  footer.site{background:var(--ink);color:#E7E0D4;margin-top:10px}
  .news{border-bottom:1px solid rgba(255,255,255,.12);padding:54px 0;text-align:center}
  .news h3{color:#fff;font-size:28px}
  .news p{color:#B6AD9E;margin:8px 0 22px}
  .news .row{display:flex;gap:10px;max-width:440px;margin:0 auto}
  .news input{flex:1;background:transparent;border:1px solid rgba(255,255,255,.28);color:#fff;border-radius:var(--r);padding:13px 16px;font-size:14px}
  .news input::placeholder{color:#9b9384}
  .news-result{min-height:18px;margin-top:14px;font-size:14px}
  .news-result.ok{color:#D7E3DC}
  .news-result.ok b{color:#fff;letter-spacing:.06em;background:rgba(255,255,255,.12);padding:2px 8px;border-radius:6px}
  .news-result.err{color:#E2B49C}
  .news-result.note{color:#CFC7B8}
  .fmain{display:flex;flex-wrap:wrap;gap:44px 56px;align-items:flex-start;padding:56px 0 38px}
  .fconnect{flex:0 0 320px;max-width:340px}
  .fconnect h5{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#fff;margin:0 0 14px;font-weight:600}
  .fsignup-label{color:#B6AD9E;font-size:13.5px;line-height:1.55;margin-bottom:14px}
  .fsignup{display:flex;gap:10px;max-width:340px}
  .fsignup input{flex:1;min-width:0;background:transparent;border:1px solid rgba(255,255,255,.28);color:#fff;border-radius:var(--r);padding:12px 14px;font-size:14px}
  .fsignup input::placeholder{color:#9b9384}
  .fsignup .btn{white-space:nowrap}
  .fsocial{display:flex;gap:16px;margin-top:20px}
  .fsocial a{color:#B6AD9E;display:inline-flex;align-items:center;transition:color .15s}
  .fsocial a:hover{color:#fff}
  .fsocial svg{width:20px;height:20px;display:block}
  .flinks{flex:1 1 520px;display:flex;gap:48px;align-items:flex-start;margin-left:auto;max-width:720px}
  .fcol{flex:1;min-width:120px}
  .fcol h5{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#fff;margin:0 0 12px;font-weight:600}
  .fcol h5 a{color:#fff;display:inline;padding:0}
  .fcol h5 a:hover{color:var(--linen)}
  .fcol a{display:block;color:#B6AD9E;padding:4px 0;font-size:13.5px}
  .fcol a:hover{color:#fff}
  .fbottom{border-top:1px solid rgba(255,255,255,.12);padding:22px 0;display:flex;justify-content:space-between;gap:14px 26px;font-size:12.5px;color:#9b9384;flex-wrap:wrap}
  .fbottom-links a{color:#9b9384;text-decoration:underline;text-underline-offset:3px;margin-left:22px}
  .fbottom-links a:first-child{margin-left:0}
  .fbottom a:hover{color:#fff}

  /* ---- toast ---- */
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:13px 22px;border-radius:var(--r);font-size:14px;opacity:0;visibility:hidden;transition:.25s;z-index:80;box-shadow:var(--shadow)}
  .toast.show{opacity:1;visibility:visible;transform:translateX(-50%)}

  /* ---- reveal ---- */
  .reveal{opacity:0;transform:translateY(16px);transition:opacity .6s ease,transform .6s ease}
  .reveal.in{opacity:1;transform:none}

  /* ================= ADMIN ================= */
  .admin{display:none;min-height:100vh;background:#F2EEE7}
  body.admin-mode .admin{display:block}
  body.admin-mode .store{display:none}
  .adbar{background:var(--loom-dk);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;position:sticky;top:0;z-index:5}
  .adbar .brand{font-family:var(--disp);font-size:18px;color:#fff;display:flex;gap:9px;align-items:center;justify-self:start;text-align:left}
  .adbar .brand small{display:none}
  .adlayout{display:grid;grid-template-columns:228px 1fr;min-height:calc(100vh - 52px)}
  .adside{background:#fff;border-right:1px solid var(--line);padding:18px 12px}
  .adside button{display:flex;gap:11px;align-items:center;width:100%;text-align:left;background:none;border:none;padding:12px 14px;border-radius:var(--r);font-size:14px;color:var(--ink);font-weight:500;margin-bottom:2px}
  .adside button:hover{background:var(--linen)}
  .adside button.active{background:var(--loom);color:#fff}
  .adside button.active svg{color:#fff}
  .adside .sgroup{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);padding:16px 14px 6px;font-weight:600}
  .admain{padding:30px 36px;overflow:auto}
  .admain h1{font-size:30px;margin:0 0 4px}
  .admain .sub{color:var(--ink-soft);margin:0 0 26px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:24px;margin-bottom:22px;box-shadow:var(--shadow)}
  .panel h3{font-family:var(--ui);font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin:0 0 18px;color:var(--ink-soft)}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:6px;letter-spacing:.02em}
  .field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:var(--r);padding:11px 13px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink)}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--loom);box-shadow:0 0 0 3px rgba(58,90,82,.12)}
  .field textarea{min-height:90px;resize:vertical}
  .field .hint{font-size:12px;color:var(--ink-soft);margin-top:5px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
  .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:8px;padding:20px;box-shadow:var(--shadow)}
  .stat .n{font-family:var(--disp);font-size:34px;line-height:1}
  .stat .l{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin-top:8px;font-weight:600}
  table.adt{width:100%;border-collapse:collapse;font-size:14px}
  table.adt th{text-align:left;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);padding:0 12px 12px;font-weight:600;border-bottom:1px solid var(--line)}
  table.adt td{padding:13px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
  table.adt tr:last-child td{border-bottom:none}
  .thumbsm{width:42px;height:42px;border-radius:var(--r);background-size:cover;background-position:center;background-color:var(--linen)}
  .tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:999px;background:var(--linen);color:var(--ink-soft);font-weight:600;letter-spacing:.04em}
  .tag.green{background:rgba(58,90,82,.14);color:var(--loom-dk)}
  .tag.clay{background:rgba(181,117,79,.16);color:var(--clay)}
  .rowbtns{display:flex;gap:8px}
  .txtbtn{background:none;border:none;color:var(--loom-dk);font-weight:600;font-size:13px;padding:4px}
  .txtbtn.danger{color:#a23b2b}
  .subpills{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .subpill{display:inline-flex;gap:8px;align-items:center;background:var(--linen);border-radius:999px;padding:5px 8px 5px 13px;font-size:13px}
  .subpill button{background:none;border:none;color:var(--ink-soft);font-size:15px;line-height:1;padding:0 2px}

  /* ---- admin variant editor ---- */
  .ptype{display:flex;gap:10px;margin-bottom:4px}
  .ptype button{flex:1;border:1px solid var(--line);background:#fff;border-radius:8px;padding:14px;text-align:left;cursor:pointer}
  .ptype button.active{border-color:var(--loom);box-shadow:0 0 0 3px rgba(58,90,82,.12)}
  .ptype button b{display:block;font-size:14px;margin-bottom:2px}
  .ptype button span{font-size:12px;color:var(--ink-soft)}
  .colorcard{border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:12px;background:#fff}
  .colorhead{display:flex;gap:10px;align-items:center}
  .colorhead input[type=color]{width:46px;height:40px;padding:3px;border:1px solid var(--line);border-radius:var(--r);flex:0 0 auto}
  .colorhead input[type=text]{flex:1}
  .photogrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:11px}
  .photogrid input{font-size:12px;padding:8px 9px}
  .photogrid8{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:6px}
  .photoslot{display:flex;gap:6px;align-items:center}
  .photoslot input{flex:1;min-width:0;font-size:12.5px;padding:9px 10px}
  .pstar{flex:0 0 auto;width:36px;height:36px;border:1px solid var(--line);background:var(--card);border-radius:8px;cursor:pointer;color:#cbc2b2;font-size:16px;line-height:1;transition:.15s}
  .pstar:hover{color:#E0A93B;border-color:#E0A93B}
  .pstar.on{color:#E0A93B;border-color:#E0A93B;background:#FBF4E6}
  .photoslot.isprim input{border-color:#E0A93B}
  .sizerow{display:grid;grid-template-columns:1fr 130px 130px 36px;gap:10px;align-items:center;margin-bottom:9px}
  details.colgroup{border:1px solid var(--line);border-radius:8px;margin-bottom:10px;background:#fff;overflow:hidden}
  details.colgroup>summary{padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-weight:600;list-style:none}
  details.colgroup>summary::-webkit-details-marker{display:none}
  details.colgroup .gbody{padding:4px 14px 14px}
  .swatchdot{width:18px;height:18px;border-radius:999px;border:1px solid rgba(0,0,0,.15);flex:0 0 auto}
  .vartable{width:100%;border-collapse:collapse;font-size:13px}
  .vartable th{text-align:left;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);padding:6px 8px;font-weight:600}
  .vartable td{padding:6px 8px;border-top:1px solid var(--line)}
  .vartable input{width:100%;padding:7px 9px;font-size:13px;border:1px solid var(--line);border-radius:var(--r)}
  .miniadd{background:none;border:1px dashed var(--line);border-radius:var(--r);padding:9px 14px;font-size:13px;font-weight:600;color:var(--loom-dk);cursor:pointer;width:100%}
  .miniadd:hover{border-color:var(--loom);background:var(--linen)}
  .pagerow{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:11px 0;border-top:1px solid var(--line)}
  .pagerow:first-of-type{border-top:none}
  .slidehead{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:14px}
  .featprev{margin-top:10px;display:flex;align-items:center;justify-content:center;min-height:60px;border:1px solid var(--line);border-radius:8px;background:var(--paper);color:var(--ink-soft);font-size:12px;letter-spacing:.08em;text-transform:uppercase}
  .featprev img{height:46px;width:auto;max-width:90px;object-fit:contain}
  .tilegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .tileprev{margin-top:10px;height:120px;border-radius:8px;border:1px solid var(--line);background:#cdbfae;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center}
  .tileprev-ic{width:58px;height:58px;border-radius:50%;border:2px solid rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;color:#fff}
  .tileprev-ic svg{width:26px;height:26px}

/* ---------- tiny helpers ---------- */
function uid(p){return (p||'id')+'_'+Math.random().toString(36).slice(2,8)}
function slugify(s){return s.toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function money(n){return '$'+Number(n).toFixed(2).replace(/\.00$/,'')}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function escAttr(s){return esc(s).replace(/'/g,'&#39;')}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200)}

/* woven swatch image as data URI (brand signature fallback) */
function weaveSwatch(color,label){
  const c=color||'#C9BBA6';
  const txt=(label||'').slice(0,22);
  const svg=`<svg xmlns='http://www.w3.org/2000/svg' width='600' height='600'>
    <defs><pattern id='w' width='16' height='16' patternUnits='userSpaceOnUse'>
      <rect width='16' height='16' fill='${c}'/>
      <path d='M0 8h16M8 0v16' stroke='rgba(255,255,255,.18)' stroke-width='2'/>
      <path d='M0 0h16M0 0v16' stroke='rgba(0,0,0,.05)' stroke-width='1'/>
    </pattern></defs>
    <rect width='600' height='600' fill='url(#w)'/>
    <rect width='600' height='600' fill='rgba(0,0,0,.04)'/>
    <text x='50%' y='540' text-anchor='middle' font-family='Inter,sans-serif' font-size='20' letter-spacing='3' fill='rgba(42,38,34,.5)'>${esc(txt.toUpperCase())}</text>
  </svg>`;
  return 'data:image/svg+xml;utf8,'+encodeURIComponent(svg);
}
function imgFor(item,label){return item && item.image ? assetUrl(item.image) : weaveSwatch(item&&item.swatch,label)}

/* ---------- collection / variant helpers ---------- */
function isCollection(p){return Array.isArray(p.options)&&p.options.length>0&&optColor(p)&&optSize(p)}
function optColor(p){return (p.options||[]).find(o=>o.type==='color')}
function optSize(p){return (p.options||[]).find(o=>o.type==='size')}
function vKey(colorId,sizeId){return colorId+'__'+sizeId}
function colorPhotos(colorVal){const imgs=(colorVal&&colorVal.images||[]).filter(Boolean).map(assetUrl);return imgs.length?imgs:[weaveSwatch(colorVal&&colorVal.hex,colorVal&&colorVal.label)]}
function genSku(p,colorVal,sizeVal){
  const pre=(p.skuPrefix||p.name||'HW').replace(/[^A-Za-z0-9]/g,'').slice(0,4).toUpperCase()||'HW';
  const c=(colorVal&&colorVal.label||'').replace(/[^A-Za-z0-9]/g,'').slice(0,3).toUpperCase();
  const s=(sizeVal&&sizeVal.label||'').replace(/[^A-Za-z0-9]/g,'').slice(0,6).toUpperCase();
  return [pre,c,s].filter(Boolean).join('-');
}
function invMap(){DB.inventory=DB.inventory||{};return DB.inventory;}
function invTracked(sku){return Object.prototype.hasOwnProperty.call(invMap(),sku);}
function invQty(sku){var v=invMap()[sku];var n=typeof v==='number'?v:parseInt(v,10);return isNaN(n)?0:n;}
function invInStock(sku,fallback){return invTracked(sku)?invQty(sku)>0:fallback;}
function simpleInStock(p){return invInStock(p.id,p.inStock!==false);}
function stockLabel(sku,inStock){
  if(!invTracked(sku))return inStock?'In stock — ships in 2–4 days':'Out of stock';
  var q=invQty(sku);
  if(q<=0)return 'Out of stock';
  if(q<=5)return 'Only '+q+' left — order soon';
  return 'In stock — '+q+' available';
}
function productFullyOut(p){
  if(isCollection(p)){
    var any=false;
    (optColor(p).values||[]).forEach(function(c){(optSize(p).values||[]).forEach(function(s){if(resolveVariant(p,c.id,s.id).inStock)any=true;});});
    return !any;
  }
  return !simpleInStock(p);
}
function allSkus(){
  var out=[];
  (DB.products||[]).forEach(function(p){
    if(isCollection(p)){
      (optColor(p).values||[]).forEach(function(c){(optSize(p).values||[]).forEach(function(s){
        var v=resolveVariant(p,c.id,s.id);
        out.push({sku:v.sku,product:p.name,variant:c.label+' / '+s.label,pid:p.id});
      });});
    }else{
      out.push({sku:p.id,product:p.name,variant:'',pid:p.id});
    }
  });
  return out;
}
function resolveVariant(p,colorId,sizeId){
  const color=optColor(p).values.find(v=>v.id===colorId)||optColor(p).values[0];
  const size=optSize(p).values.find(v=>v.id===sizeId)||optSize(p).values[0];
  const ov=(p.variants&&p.variants[vKey(color.id,size.id)])||{};
  const price = ov.price!=null?ov.price : (size.price!=null?size.price : p.basePrice);
  const salePrice = ov.salePrice!=null?ov.salePrice : (size.salePrice!=null?size.salePrice : (p.baseSalePrice!=null?p.baseSalePrice:null));
  const sku=ov.sku||genSku(p,color,size);
  const baseStock = ov.inStock!=null?ov.inStock : (p.inStock!==false);
  const inStock = invInStock(sku,baseStock);
  return {color,size,price,salePrice,inStock,images:colorPhotos(color),sku};
}
function priceRange(p){
  if(!isCollection(p)){const eff=p.salePrice!=null&&p.salePrice<p.price?p.salePrice:p.price;return{min:eff,max:eff};}
  const vals=[];
  optColor(p).values.forEach(c=>optSize(p).values.forEach(s=>{const r=resolveVariant(p,c.id,s.id);vals.push(r.salePrice!=null&&r.salePrice<r.price?r.salePrice:r.price);}));
  return{min:Math.min.apply(null,vals),max:Math.max.apply(null,vals)};
}
function colorPrimary(c){const raw=(c&&c.images)||[];const u=raw[(c&&c.primary)||0]||raw.find(Boolean);return u?assetUrl(u):weaveSwatch(c&&c.hex,c&&c.label);}
function primaryImage(p){
  if(isCollection(p)){const c=optColor(p).values[0];return colorPrimary(c);}
  const raw=p.images||[];const u=raw[p.primary||0]||raw.find(Boolean);return u?assetUrl(u):imgFor(p,p.name);
}

async function sbSignOut(){const sb=sbClient();if(sb){try{await sb.auth.signOut();}catch(e){}}}

async function loadStore(){
  if(sbCfg()){const d=await sbLoad();if(d)return d;}
  if(hasStore){
    try{const r=await window.storage.get(KEY);if(r&&r.value)return JSON.parse(r.value);}catch(e){}
    return null;
  }
  if(hasLocal){try{const v=localStorage.getItem(KEY);return v?JSON.parse(v):null;}catch(e){return null;}}
  return mem[KEY]?JSON.parse(mem[KEY]):null;
}
async function saveStore(d){
  const v=JSON.stringify(d);
  if(sbCfg()){const ok=await sbSave(d);_lastPublish={ok:ok,at:Date.now()};}
  if(hasStore){try{await window.storage.set(KEY,v);}catch(e){console.warn('cache save failed',e);}}
  else if(hasLocal){try{localStorage.setItem(KEY,v);}catch(e){console.warn('localStorage save failed',e);}}
  else mem[KEY]=v;
  return true;
}

/* ---------- routing (History API, path-based) ---------- */
// Base path: on GitHub Pages project sites the first path segment is the repo
// (e.g. /Website/). Locally or at domain root it is '/'.
function computeBase(){
  try{
    var segs=location.pathname.split('/').filter(Boolean);
    if(/github\.io$/i.test(location.hostname) && segs.length) return '/'+segs[0]+'/';
  }catch(e){}
  return '/';
}
const BASE=computeBase();
// Build an in-app href from an app path like '/product/x' (with optional ?query).
function link(p){
  p=String(p==null?'/':p);
  if(/^(https?:|mailto:|tel:|#)/i.test(p)) return p; // external/hash untouched
  if(p.charAt(0)==='/') p=p.slice(1);
  return BASE+p;
}
// Resolve an asset reference (image/video/feed). Full URLs & data URIs pass through;
// root-relative or bare-relative local paths are anchored to BASE so they work on subpaths.
function assetUrl(p){
  p=String(p==null?'':p);
  if(!p) return p;
  if(/^(https?:|data:|blob:)/i.test(p)) return p;
  if(p.charAt(0)==='/') p=p.slice(1);
  return BASE+p;
}
function navigate(p){
  history.pushState({},'',link(p));
  router();
}
function parseRoute(){
  var path=location.pathname;
  if(path.indexOf(BASE)===0) path=path.slice(BASE.length);
  path=path.replace(/^\/+/,'');
  var parts=path.split('/').filter(Boolean);
  var q={};
  try{new URLSearchParams(location.search).forEach(function(v,k){q[k]=v;});}catch(e){}
  if(parts[0]==='admin') return {name:'admin',params:{}};
  if(parts[0]==='category') return {name:'category',params:{slug:parts[1],sub:q.sub}};
  if(parts[0]==='product') return {name:'product',params:{slug:parts[1]}};
  if(parts[0]==='page') return {name:'page',params:{slug:parts[1]}};
  return {name:'home',params:{}};
}
function router(){
  route=parseRoute();
  heroPause();
  if(route.name==='admin'){enterAdmin();return;}
  document.body.classList.remove('admin-mode');
  const v=document.getElementById('view');
  if(route.name==='home'){v.innerHTML=renderHome();initHeroSlider();initRails();}
  else if(route.name==='category'){v.innerHTML=renderCategory(route.params);initCatSlider();}
  else if(route.name==='product'){v.innerHTML=renderProduct(route.params);initGallery();}
  else if(route.name==='page') v.innerHTML=renderPage(route.params);
  window.scrollTo(0,0);
  observeReveals();
}
// Intercept in-app link clicks for SPA navigation.
// '#/...' links become path navigation; Snipcart's own '#' links and externals are left alone.
function wireLinkClicks(){
  document.addEventListener('click',function(e){
    if(e.defaultPrevented||e.button!==0||e.metaKey||e.ctrlKey||e.shiftKey||e.altKey) return;
    var a=e.target.closest?e.target.closest('a'):null;
    if(!a||(a.closest&&a.closest('#snipcart'))) return; // leave Snipcart UI alone
    var href=a.getAttribute('href');
    if(!href||a.target==='_blank'||a.hasAttribute('download')) return;
    if(href.charAt(0)==='#'){
      if(href.charAt(1)==='/'){e.preventDefault();navigate(href.slice(1));} // '#/x' -> '/x'
      return; // other '#...' (incl. Snipcart) untouched
    }
    if(/^(mailto:|tel:|https?:)/i.test(href)) return;
    var url;try{url=new URL(a.href,location.href);}catch(err){return;}
    if(url.origin!==location.origin||url.pathname.indexOf(BASE)!==0) return;
    e.preventDefault();
    history.pushState({},'',url.pathname+url.search);
    router();
  });
}
// On load, normalize any legacy '#/...' deep-link into a real path so Snipcart never sees app hashes.
function normalizeEntryHash(){
  var h=location.hash;
  if(h&&h.charAt(1)==='/'){history.replaceState({},'',link(h.slice(1)));}
}

let catFilter={subs:new Set(),colors:new Set(),materials:new Set(),min:'',max:''};
let _catCtx=null;
function repPrice(p){
  if(isCollection(p)){const r=priceRange(p);return r.min;}
  return (p.salePrice!=null&&p.salePrice!=='')?+p.salePrice:+p.price;
}
function productColorList(p){
  if(!isCollection(p))return [];
  const o=optColor(p);return o?o.values.map(v=>({label:v.label,hex:v.hex})):[];
}
function filterCatItems(){
  const all=_catCtx.all,f=catFilter;
  const min=(f.min!==''&&f.min!=null)?parseFloat(f.min):null;
  const max=(f.max!==''&&f.max!=null)?parseFloat(f.max):null;
  return all.filter(p=>{
    if(f.subs.size&&!f.subs.has(p.subcategoryId))return false;
    if(f.materials.size&&!f.materials.has(p.material))return false;
    if(f.colors.size){const labels=productColorList(p).map(c=>c.label);if(!labels.some(l=>f.colors.has(l)))return false;}
    const pr=repPrice(p);
    if(min!=null&&!isNaN(min)&&pr<min)return false;
    if(max!=null&&!isNaN(max)&&pr>max)return false;
    return true;
  });
}
function cfGroup(title,inner){return `<div class="cf-group"><h4>${esc(title)}</h4>${inner}</div>`;}
function buildCatSidebar(){
  const {cat,all,fcfg}=_catCtx;
  let groups='';
  if(fcfg.type&&cat.subcategories.length){
    groups+=cfGroup('Type',cat.subcategories.map(s=>
      `<label class="cf-opt"><input type="checkbox" data-g="subs" data-v="${escAttr(s.id)}" ${catFilter.subs.has(s.id)?'checked':''} onchange="catToggleEl(this)"><span>${esc(s.name)}</span></label>`).join(''));
  }
  if(fcfg.color){
    const cmap={};all.forEach(p=>productColorList(p).forEach(c=>{if(!cmap[c.label])cmap[c.label]=c.hex;}));
    const labels=Object.keys(cmap).sort();
    if(labels.length)groups+=cfGroup('Color',`<div class="cf-colors">${labels.map(l=>
      `<label class="cf-color" title="${escAttr(l)}"><input type="checkbox" data-g="colors" data-v="${escAttr(l)}" ${catFilter.colors.has(l)?'checked':''} onchange="catToggleEl(this)"><span class="cf-dot" style="background:${escAttr(cmap[l])}"></span><span class="cf-clabel">${esc(l)}</span></label>`).join('')}</div>`);
  }
  if(fcfg.material){
    const mats=[...new Set(all.map(p=>p.material).filter(Boolean))].sort();
    if(mats.length)groups+=cfGroup('Material',mats.map(m=>
      `<label class="cf-opt"><input type="checkbox" data-g="materials" data-v="${escAttr(m)}" ${catFilter.materials.has(m)?'checked':''} onchange="catToggleEl(this)"><span>${esc(m)}</span></label>`).join(''));
  }
  if(fcfg.price&&all.length){
    const prices=all.map(repPrice).filter(n=>typeof n==='number'&&!isNaN(n));
    const lo=prices.length?Math.floor(Math.min(...prices)):0,hi=prices.length?Math.ceil(Math.max(...prices)):0;
    if(hi>lo){
      const mn=catFilter.min!==''?catFilter.min:lo, mx=catFilter.max!==''?catFilter.max:hi;
      groups+=cfGroup('Price',`
        <div class="cf-slider" data-lo="${lo}" data-hi="${hi}">
          <div class="cf-strack"></div>
          <div class="cf-srange"></div>
          <input type="range" class="cf-smin" min="${lo}" max="${hi}" step="1" value="${mn}" oninput="cfSlide(this)" aria-label="Minimum price">
          <input type="range" class="cf-smax" min="${lo}" max="${hi}" step="1" value="${mx}" oninput="cfSlide(this)" aria-label="Maximum price">
        </div>
        <div class="cf-slabels"><span class="cf-sminL">${money(mn)}</span><span class="cf-smaxL">${money(mx)}</span></div>`);
    } else {
      groups+=cfGroup('Price',`<div class="cf-pricehint">All ${money(lo)}</div>`);
    }
  }
  const active=catFilter.subs.size+catFilter.colors.size+catFilter.materials.size+(catFilter.min!==''?1:0)+(catFilter.max!==''?1:0);
  const head=`<div class="cf-head"><span>Filter</span>${active?`<button class="cf-clear" onclick="catClearAll()">Clear all</button>`:''}</div>`;
  return groups?head+groups:`<div class="cf-head"><span>Filter</span></div><p class="muted" style="font-size:13px">No filters set for this collection.</p>`;
}
function catToggleEl(el){
  const g=el.getAttribute('data-g'),v=el.getAttribute('data-v');
  if(el.checked)catFilter[g].add(v);else catFilter[g].delete(v);
  refreshCatHead();applyCatFilter();
}
function catPrice(which,v){catFilter[which]=v;refreshCatHead();applyCatFilter();}
function cfSlide(el){
  const sl=el.closest('.cf-slider');if(!sl)return;
  const lo=+sl.dataset.lo,hi=+sl.dataset.hi;
  const minI=sl.querySelector('.cf-smin'),maxI=sl.querySelector('.cf-smax');
  let mn=+minI.value,mx=+maxI.value;
  if(mn>mx){if(el===minI){mn=mx;minI.value=mn;}else{mx=mn;maxI.value=mx;}}
  const range=sl.querySelector('.cf-srange');
  const p1=hi>lo?((mn-lo)/(hi-lo))*100:0,p2=hi>lo?((mx-lo)/(hi-lo))*100:100;
  range.style.left=p1+'%';range.style.right=(100-p2)+'%';
  const grp=sl.parentElement;
  const lL=grp.querySelector('.cf-sminL'),rL=grp.querySelector('.cf-smaxL');
  if(lL)lL.textContent=money(mn);if(rL)rL.textContent=money(mx);
  catFilter.min=(mn<=lo)?'':mn;
  catFilter.max=(mx>=hi)?'':mx;
  refreshCatHead();applyCatFilter();
}

  document.querySelectorAll('.cf-slider').forEach(sl=>{

    range.style.left=p1+'%';range.style.right=(100-p2)+'%';

}

/* minimal, safe formatter for admin-authored page bodies */
function renderRichText(md){
  const esc1=s=>s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const inline=s=>esc1(s)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\[(.+?)\]\((https?:\/\/[^\s)]+|#[^\s)]*)\)/g,'<a class="link-u" href="$2">$1</a>');
  const lines=String(md||'').split('\n');
  let html='',list=null,para=[];
  const flushPara=()=>{if(para.length){html+='<p>'+para.map(inline).join('<br>')+'</p>';para=[];}};
  const flushList=()=>{if(list){html+='<ul>'+list.map(li=>'<li>'+inline(li)+'</li>').join('')+'</ul>';list=null;}};
  lines.forEach(raw=>{
    const line=raw.replace(/\s+$/,'');
    if(/^\s*$/.test(line)){flushPara();flushList();return;}
    if(/^##\s+/.test(line)){flushPara();flushList();html+='<h3>'+inline(line.replace(/^##\s+/,''))+'</h3>';return;}
    if(/^#\s+/.test(line)){flushPara();flushList();html+='<h2>'+inline(line.replace(/^#\s+/,''))+'</h2>';return;}
    if(/^\s*-\s+/.test(line)){flushPara();list=list||[];list.push(line.replace(/^\s*-\s+/,''));return;}
    flushList();para.push(line);
  });
  flushPara();flushList();
  return html;
}

function videoPlayer(url){
  url=(url||'').trim();if(!url)return '';
  let m=url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{6,})/);
  if(m)return `<iframe src="https://www.youtube.com/embed/${m[1]}?rel=0&modestbranding=1&playsinline=1" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen frameborder="0"></iframe>`;
  m=url.match(/vimeo\.com\/(?:video\/)?(\d+)/);
  if(m)return `<iframe src="https://player.vimeo.com/video/${m[1]}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen frameborder="0"></iframe>`;
  if(/\.(mp4|webm|ogg)(\?|#|$)/i.test(url))return `<video src="${escAttr(url)}" controls playsinline></video>`;
  return `<iframe src="${escAttr(url)}" allowfullscreen frameborder="0"></iframe>`;
}

function addToCart(id,qty,colorId,sizeId){
  const p=DB.products.find(x=>x.id===id);if(!p)return;
  qty=parseInt(qty||1,10)||1;
  if(isCollection(p)){
    if(!colorId||!sizeId){navigate('/product/'+p.slug);return;}
    const v=resolveVariant(p,colorId,sizeId);

    const price=v.salePrice!=null&&v.salePrice<v.price?v.salePrice:v.price;
    const ex=cart.find(c=>c.line===line);
    if(ex)ex.qty+=qty; else cart.push({line,id:p.id,name:p.name,variant:v.color.label+' / '+v.size.label,price,image:v.images[0],qty});
    updateCartUI();toast(p.name+' added to cart');openCart();return;
  }
  const line=p.id;const price=p.salePrice!=null&&p.salePrice<p.price?p.salePrice:p.price;
  if(!simpleInStock(p)){toast('This item is out of stock');return;}

}
function changeQty(line,d){const c=cart.find(x=>x.line===line);if(!c)return;c.qty+=d;if(c.qty<=0)cart=cart.filter(x=>x.line!==line);updateCartUI();}
function removeItem(line){cart=cart.filter(x=>x.line!==line);updateCartUI();}
function cartTotal(){return cart.reduce((s,c)=>s+c.price*c.qty,0)}
function computeTotals(){
  const sub=cartTotal();
  const sh=DB.shipping||{enabled:true,freeThreshold:75,flatRate:9.95};
  let discount=0,promoValid=true,promoNote='';
  const promo=appliedPromo;
  if(promo){
    if((promo.minOrder||0)>sub){promoValid=false;promoNote='Spend '+money(promo.minOrder)+' to use '+promo.code+'.';}
    else{discount=promo.type==='percent'?sub*(promo.value/100):Math.min(promo.value,sub);}
  }
  discount=Math.round(discount*100)/100;
  const afterDiscount=Math.max(0,sub-discount);
  let ship=0,freeShip=true,remaining=0;
  if(sh.enabled){
    if(sub>=sh.freeThreshold||sub===0){freeShip=true;ship=0;}
    else{freeShip=false;ship=sh.flatRate;remaining=Math.round((sh.freeThreshold-sub)*100)/100;}
  }
  return {sub,discount,afterDiscount,ship,total:afterDiscount+ship,promo,promoValid,promoNote,freeShip,remaining,sh};
}

function snipCat(s){return String(s||'').replace(/[^A-Za-z0-9 \-]/g,'').replace(/\s+/g,' ').trim();}
function snipFeedUrl(){const s=DB.snipcart||{};var u=(s.feedUrl||'').trim();if(!u)return assetUrl('products.json');return /^https?:/i.test(u)?u:assetUrl(u);}
function snipDataAttrs(o){

// Snipcart injects a fixed "TEST MODE" bar at the very top (test mode only).
// Measure it and push our chrome down by that amount so nothing is hidden.
// In live mode the bar doesn't exist, so the offset stays 0.
function fitSnipcartTopBar(){
  function calc(){
    var off=0;
    var all=document.getElementsByTagName('*');
    for(var i=0;i<all.length;i++){
      var el=all[i];
      if(el.children.length>2) continue;
      var t=(el.textContent||'').trim();
      if(/^test mode$/i.test(t)){
        var r=el.getBoundingClientRect();
        if(r.top<70 && r.bottom>off) off=r.bottom;
      }
    }
    document.documentElement.style.setProperty('--snip-top', Math.round(off)+'px');
  }
  calc();
  var n=0, iv=setInterval(function(){calc(); if(++n>24) clearInterval(iv);}, 500);
  window.addEventListener('resize', calc);
}
function snipFeed(){
  const base=[];
  (DB.products||[]).forEach(p=>{
    const url=snipFeedUrl();
    const cat=DB.categories.find(c=>c.id===p.categoryId);
    const sub=cat&&cat.subcategories.find(s=>s.id===p.subcategoryId);
    const cats=[snipCat(cat&&cat.name),snipCat(sub&&sub.name)].filter(Boolean);
    if(isCollection(p)){
      optColor(p).values.forEach(c=>optSize(p).values.forEach(sz=>{
        const v=resolveVariant(p,c.id,sz.id);if(!v.inStock)return;
        const price=(v.salePrice!=null&&v.salePrice<v.price)?v.salePrice:v.price;
        const e={id:v.sku,name:p.name,price:+(+price).toFixed(2),url,
          image:colorPrimary(c),description:(p.description||'').slice(0,180),categories:cats};
        if(p.weight!=null)e.dimensions={weight:Math.round(+p.weight)};
        base.push(e);
      }));
    }else{
      if(!simpleInStock(p))return;
      const price=(p.salePrice!=null&&p.salePrice<p.price)?p.salePrice:p.price;
      const e={id:p.id,name:p.name,price:+(+price).toFixed(2),url,image:primaryImage(p),description:(p.description||'').slice(0,180),categories:cats};
      if(p.weight!=null)e.dimensions={weight:Math.round(+p.weight)};
      base.push(e);
    }
  });
  return base;
}
async function exportSnipcartFeed(){
  const feed=snipFeed();
  const seen={},dups=[];
  feed.forEach(f=>{if(seen[f.id]&&seen[f.id]!==f.price)dups.push(f.id);seen[f.id]=f.price;});
  const data=JSON.stringify(feed,null,2);
  const blob=new Blob([data],{type:'application/json'});const u=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=u;a.download='products.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);
  if(dups.length)toast('Heads up: duplicate SKU(s) with different prices: '+[...new Set(dups)].join(', ')+'. Give each a unique SKU.');
  else toast('products.json downloaded — place it next to index.html');
}

async function subscribe(){

  const res=document.getElementById('newsResult');
  const email=(e?e.value:'').trim();
  if(!email||!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){
    if(res){res.className='news-result err';res.textContent='Please enter a valid email address.';}
    return;
  }
  DB.subscribers=DB.subscribers||[];
  const existing=DB.subscribers.find(s=>s.email.toLowerCase()===email.toLowerCase());
  if(existing){
    if(e)e.value='';
    if(res){res.className='news-result note';res.textContent='You’re already on our list — thanks!';}
    return;
  }
  const code=(DB.newsletter&&DB.newsletter.couponCode)||'WELCOME15';
  const promo=(DB.promos||[]).find(p=>p.code===code);
  const offer=promo?(promo.type==='percent'?promo.value+'% off':money(promo.value)+' off'):'your discount';
  DB.subscribers.push({email,code,date:new Date().toISOString()});
  await persist();
  if(e)e.value='';
  if(res){res.className='news-result ok';res.textContent='You’re on the list ✓  Your '+offer+' code is on its way to your inbox.';}
}

/* ---------- hero slider ---------- */
let _heroIdx=0,_heroTimer=null,_heroCount=0;
function _heroSlides(){return document.querySelectorAll('#heroSlider .hslide')}
function _heroDots(){return document.querySelectorAll('#heroSlider .hdots button')}
function heroShow(i){
  const s=_heroSlides();if(!s.length)return;
  _heroCount=s.length;_heroIdx=(i+s.length)%s.length;
  s.forEach((el,j)=>el.classList.toggle('active',j===_heroIdx));
  _heroDots().forEach((d,j)=>d.classList.toggle('active',j===_heroIdx));
}
function heroGo(d){heroShow(_heroIdx+d);heroPlay();}
function heroTo(i){heroShow(i);heroPlay();}
function heroPause(){if(_heroTimer){clearInterval(_heroTimer);_heroTimer=null;}}
function heroPlay(){
  heroPause();
  const h=DB.hero||{};
  const reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(h.autoplay!==false&&!reduce&&_heroCount>1){
    const ms=Math.max(2000,h.interval||5000);
    _heroTimer=setInterval(()=>heroShow(_heroIdx+1),ms);
  }
}
function initHeroSlider(){const s=_heroSlides();if(!s.length){heroPause();return;}_heroCount=s.length;_heroIdx=0;heroPlay();}

/* ---------- horizontal rails (categories, featured) ---------- */
function railScroll(id,dir){const r=document.getElementById(id);if(!r)return;const amt=Math.max(280,r.clientWidth*0.85);r.scrollBy({left:dir*amt,behavior:'smooth'});}
function railUpdate(id){
  const r=document.getElementById(id);if(!r)return;
  const wrap=r.closest('.rail-wrap');if(!wrap)return;
  const overflow=r.scrollWidth-r.clientWidth>4;
  const prev=wrap.querySelector('.rail-nav.prev'),next=wrap.querySelector('.rail-nav.next');
  const atStart=r.scrollLeft<=2,atEnd=r.scrollLeft>=r.scrollWidth-r.clientWidth-2;
  if(prev)prev.classList.toggle('off',!overflow||atStart);
  if(next)next.classList.toggle('off',!overflow||atEnd);
}
function initRails(){railUpdate('catRail');railUpdate('featRail');}

/* ---------- reveals on scroll ---------- */
let _io;
function observeReveals(){
  if(_io)_io.disconnect();
  _io=new IntersectionObserver(es=>es.forEach(en=>{if(en.isIntersecting){en.target.classList.add('in');_io.unobserve(en.target);}}),{threshold:.12});
  document.querySelectorAll('.reveal:not(.in)').forEach(el=>_io.observe(el));
}

async function aiCall(userPrompt,system){
  const res=await fetch(mktEndpoint(),{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2000,system:system||'',messages:[{role:'user',content:userPrompt}]})
  });
  if(!res.ok) throw new Error('AI request failed ('+res.status+')');
  const data=await res.json();
  return (data.content||[]).filter(b=>b&&b.type==='text').map(b=>b.text).join('\n').trim();
}
function parseAIJSON(raw){
  var t=(raw||'').replace(/```json|```/g,'').trim();
  try{return JSON.parse(t);}catch(e){}
  var s=t.indexOf('{'),e2=t.lastIndexOf('}');
  if(s>=0&&e2>s){try{return JSON.parse(t.slice(s,e2+1));}catch(e){}}
  var as=t.indexOf('['),ae=t.lastIndexOf(']');
  if(as>=0&&ae>as){try{return JSON.parse(t.slice(as,ae+1));}catch(e){}}
  throw new Error('The AI reply came back incomplete — tap the button once more.');
}

function mktBlock(label,val){
  val=val||'';
  const id='mk'+Math.random().toString(36).slice(2,8);
  const rows=Math.min(9,Math.max(2,Math.ceil(val.length/58)));
  return `<div style="margin:0 0 14px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><b style="font-size:13px">${esc(label)}</b><button class="btn ghost sm" onclick="mktCopy('${id}')">Copy</button></div><textarea id="${id}" rows="${rows}" style="width:100%;font-family:var(--ui)">${esc(val)}</textarea></div>`;
}
function mktCopy(id){var el=document.getElementById(id);if(!el)return;try{el.select();navigator.clipboard.writeText(el.value);}catch(e){}toast('Copied');}
function mktImageBlock(label,val){
  val=val||'';
  const id='mk'+Math.random().toString(36).slice(2,8);const slot=id+'i';
  const rows=Math.min(9,Math.max(2,Math.ceil(val.length/58)));
  return `<div style="margin:0 0 18px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;gap:8px;flex-wrap:wrap"><b style="font-size:13px">${esc(label)}</b><span style="display:flex;gap:6px"><button class="btn ghost sm" onclick="mktCopy('${id}')">Copy</button><button class="btn loom sm" onclick="genImage('${id}','${slot}')">🎨 Generate image</button></span></div><textarea id="${id}" rows="${rows}" style="width:100%;font-family:var(--ui)">${esc(val)}</textarea><div id="${slot}" style="margin-top:8px"></div></div>`;
}
async function genImage(taId,slotId){
  ensureMkt();
  const slot=document.getElementById(slotId);const ta=document.getElementById(taId);
  if(!slot||!ta)return;
  const prompt=(ta.value||'').trim();
  const ep=((DB.marketing&&DB.marketing.imageEndpoint)||'').trim();
  if(!ep){slot.innerHTML='<div class="panel" style="border-color:var(--clay);padding:10px 12px"><b>No image endpoint set.</b><p class="hint" style="margin:6px 0 0">Add your image-proxy URL in <b>Image endpoint</b> above and Save, then try again. (Image generation needs a separate provider like OpenAI — see the image-proxy worker file.)</p></div>';return;}
  if(!prompt){slot.innerHTML='<p class="hint">Add a prompt first.</p>';return;}
  slot.innerHTML='<p class="hint">🎨 Generating image… this can take 10–25 seconds.</p>';
  try{
    const res=await fetch(ep,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:prompt,size:'1024x1024'})});
    let data={};try{data=await res.json();}catch(e){}
    const src=data.image||data.url;
    if(!src)throw new Error(data.error||('Request failed ('+res.status+')'));
    slot.innerHTML='<img src="'+src+'" alt="Generated image" style="max-width:420px;width:100%;border-radius:10px;border:1px solid var(--line);display:block"><div style="margin-top:8px"><a class="btn ghost sm" href="'+src+'" download="home-weavers-image.png">Download image</a></div><p class="hint" style="margin:6px 0 0">Download it, then add it to a product (Products → image) or use it in your post.</p>';
  }catch(e){slot.innerHTML='<div class="panel" style="border-color:var(--clay);padding:10px 12px"><b>Couldn\'t generate image.</b><p class="hint" style="margin:6px 0 0">'+esc(e.message||'Error')+'</p></div>';}
}
function renderMktResult(kind,d){
  if(kind==='post'){
    const ig=d.instagram||{},pin=d.pinterest||{};
    return `<h4 style="margin:0 0 8px">📷 Instagram</h4>${mktBlock('Caption',ig.caption)}${mktBlock('Hashtags',(ig.hashtags||[]).map(h=>'#'+String(h).replace(/^#/,'')).join(' '))}`
      +`<h4 style="margin:16px 0 8px">📌 Pinterest</h4>${mktBlock('Pin title',pin.title)}${mktBlock('Description',pin.description)}${mktBlock('Hashtags',(pin.hashtags||[]).map(h=>'#'+String(h).replace(/^#/,'')).join(' '))}`
      +(d.image_idea?'<p class="hint">📸 Photo idea: '+esc(d.image_idea)+'</p>':'');
  }
  if(kind==='plan'){
    const wk=d.week||[];
    return wk.length?wk.map(x=>`<div class="panel" style="padding:12px 14px;margin:0 0 10px"><b>${esc(x.day||'')} · ${esc(x.platform||'')}</b><p class="hint" style="margin:4px 0">${esc(x.idea||'')}</p>${mktBlock('Caption',x.caption)}</div>`).join(''):'<p class="hint">No plan returned — try again.</p>';
  }
  if(kind==='image'){
    const ps=d.prompts||[];
    return ps.length?'<p class="hint" style="margin:0 0 10px">Edit a prompt if you like, then hit 🎨 Generate image — or copy it into Midjourney/Firefly.</p>'+ps.map(x=>mktImageBlock('📸 '+(x.label||'Image prompt'),x.prompt)).join(''):'<p class="hint">No prompts returned — try again.</p>';
  }
  const cs=d.campaigns||[];
  return cs.length?cs.map(c=>`<div class="panel" style="padding:12px 14px;margin:0 0 10px"><b>${esc(c.name||'')}</b><p style="margin:4px 0"><i>${esc(c.hook||'')}</i></p><p class="hint" style="margin:4px 0">${esc(c.angle||'')}</p><p class="hint">Channels: ${esc((c.channels||[]).join(', '))}</p></div>`).join(''):'<p class="hint">No ideas returned — try again.</p>';
}
async function genMarketing(kind){
  const out=document.getElementById('mktOut');if(!out)return;
  DB.marketing=DB.marketing||{};
  const vEl=document.getElementById('mkt_voice');if(vEl)DB.marketing.voice=vEl.value;
  const eEl=document.getElementById('mkt_endpoint');if(eEl)DB.marketing.endpoint=eEl.value.trim();
  const pid=(document.getElementById('mkt_prod')||{}).value;
  const p=(DB.products||[]).find(x=>x.id===pid)||(DB.products||[])[0];
  out.innerHTML='<p class="hint">✨ Generating… this takes a few seconds.</p>';
  try{
    const brand=(DB.brand&&DB.brand.name)||'Home Weavers';
    const voice=(DB.marketing.voice||'').trim()||'a premium, warm, understated home-textiles brand that celebrates natural fibers and craftsmanship';
    const price=p?(p.price!=null?p.price:(p.basePrice!=null?p.basePrice:'')):'';
    const ctx=p?`Product: ${p.name}\nApprox price: $${price}\nDescription: ${(p.description||'').slice(0,400)}\nMaterial: ${p.material||'n/a'}`:'';
    let prompt;
    if(kind==='post'){
      prompt=`Brand: ${brand}\nBrand voice: ${voice}\n${ctx}\n\nWrite social posts to sell this product. Return ONLY valid JSON, no markdown:\n{"instagram":{"caption":"engaging caption, 1-2 emojis, a clear CTA","hashtags":["8-12 relevant tags, no # symbol"]},"pinterest":{"title":"keyword-rich title under 100 chars","description":"SEO-friendly description around 200 chars","hashtags":["5-8 tags, no # symbol"]},"image_idea":"one-line styling/photo concept"}`;
    }else if(kind==='plan'){
      prompt=`Brand: ${brand}\nBrand voice: ${voice}\nCatalog highlights: ${(DB.products||[]).slice(0,8).map(x=>x.name).join(', ')}\n\nCreate a 7-day social content plan mixing Instagram and Pinterest. Return ONLY valid JSON, no markdown:\n{"week":[{"day":"Monday","platform":"Instagram","idea":"short concept","caption":"ready-to-post caption"}]}`;
    }else if(kind==='image'){
      prompt=`Brand: ${brand}\nBrand voice: ${voice}\n${ctx}\n\nWrite 3 detailed, photorealistic prompts I can paste into an AI image generator (Midjourney, DALL-E, Firefly) to make marketing images for this product. Cover: (1) a clean hero/studio shot, (2) a styled in-room lifestyle scene, (3) a close-up texture/detail shot. Each prompt should specify composition, lighting, setting, colors and mood. Return ONLY valid JSON, no markdown:\n{"prompts":[{"label":"Hero shot","prompt":"..."},{"label":"Lifestyle scene","prompt":"..."},{"label":"Texture detail","prompt":"..."}]}`;
    }else{
      prompt=`Brand: ${brand}\nBrand voice: ${voice}\nCatalog: ${(DB.products||[]).slice(0,10).map(x=>x.name).join(', ')}\n\nPropose 3 distinct marketing campaign ideas for this home-textiles store. Return ONLY valid JSON, no markdown:\n{"campaigns":[{"name":"...","hook":"one-line hook","angle":"why it works in 1-2 sentences","channels":["Instagram","Pinterest","Email"]}]}`;
    }
    const raw=await aiCall(prompt,'You are a senior e-commerce social media strategist for premium home brands. Output only valid JSON — no markdown fences, no preamble.');
    const parsed=parseAIJSON(raw);
    out.innerHTML=renderMktResult(kind,parsed);
    mktOut=out.innerHTML;
  }catch(e){
    out.innerHTML='<div class="panel" style="border-color:var(--clay)"><b>Couldn\'t generate that.</b><p class="hint" style="margin:6px 0 0">'+esc(e.message||'Error')+'. In this preview the AI should respond; on your live site, make sure the AI endpoint above points to your proxy.</p></div>';
  }
}

function blankCatalog(){DB.products=[];DB.categories=[];DB.promos=[];DB.inventory={};DB.subscribers=[];DB._sampleCollectionSeeded=true;}
async function emptyStore(){
  if(!confirm('Empty the store?\n\nThis deletes ALL products, categories, promo codes and inventory so you can load your own. Your brand settings, Snipcart keys and AI settings are kept.\n\nThis cannot be undone — export a backup first.'))return;
  blankCatalog();await persist();paintChrome();renderAdmin();toast('Store emptied — ready for your products');
}
function exportBackup(){
  try{
    var data=JSON.stringify(DB,null,2);
    var d=new Date();var stamp=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    var blob=new Blob([data],{type:'application/json'});var u=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=u;a.download='home-weavers-backup-'+stamp+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);
    toast('Backup downloaded');
  }catch(e){toast('Could not export backup');}
}
function importBackup(){
  var inp=document.getElementById('imp_file');
  if(!inp||!inp.files||!inp.files[0]){toast('Choose a backup file first');return;}
  var fr=new FileReader();
  fr.onload=function(){
    try{
      var obj=JSON.parse(fr.result);
      if(!obj||typeof obj!=='object'||!Array.isArray(obj.products)||!Array.isArray(obj.categories)){toast('That does not look like a Home Weavers backup');return;}
      if(!confirm('Replace the current store with this backup?\n\nThis overwrites everything currently in the store.'))return;
      DB=obj;DB.inventory=DB.inventory||{};DB.marketing=DB.marketing||{};
      persist().then(function(){paintChrome();renderAdmin();toast('Backup restored');});
    }catch(e){toast('Could not read that file');}
  };
  fr.onerror=function(){toast('Could not read that file');};
  fr.readAsText(inp.files[0]);
}

async function saveStorefront(){
  DB.brand.name=val('f_brandName');DB.brand.tagline=val('f_brandTag');DB.brand.logoImage=val('f_brandLogo').trim();
  DB.brand.hideName=!!(document.getElementById('f_hideName')&&document.getElementById('f_hideName').checked);
  DB.announcement=val('f_announce');
  DB.social={facebook:val('f_fb').trim(),instagram:val('f_ig').trim(),pinterest:val('f_pin').trim()};
  DB.snipcart={
    enabled:!!(document.getElementById('sn_on')&&document.getElementById('sn_on').checked),
    apiKey:val('sn_key').trim(),currency:(val('sn_cur').trim()||'usd').toLowerCase(),
    mode:val('sn_mode')||'side',version:val('sn_ver').trim()||'3.7.1',feedUrl:val('sn_feed').trim()||'/products.json'
  };
  await persist();paintChrome();initSnipcart();toast('Storefront updated');
}
function refreshLogoPrev(){
  const box=document.getElementById('logoPrev');if(!box)return;
  const url=(val('f_brandLogo')||'').trim();
  const name=esc(val('f_brandName')||'');
  const hide=!!(document.getElementById('f_hideName')&&document.getElementById('f_hideName').checked);
  if(url){
    box.innerHTML='<img src="'+url.replace(/"/g,'&quot;')+'" alt="logo">'+(hide?'':'<span class="logoword" style="margin-left:12px">'+name+'</span>');
  }else{
    box.innerHTML='<span class="logoword">'+(name||'Home Weavers')+'</span>';
  }
}
