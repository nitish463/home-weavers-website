services:
  - type: web
    name: home-weavers
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CONTACT_TO
        value: nitish@homeweavers.net
      - key: CONTACT_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SHIPSTATION_API_KEY
        sync: false
      - key: SHIPSTATION_API_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
